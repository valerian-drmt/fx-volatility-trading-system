# Production-like compose file. Ships the full v2 stack across three
# networks (public / internal / external) so downstream PRs can just
# attach new services (api, frontend, nginx, ib-gateway) without
# reworking the topology.
#
# Dev quick-iter continues to live in docker-compose.dev.yml — that one
# only exposes postgres + redis on host ports so the app code can run
# on the host with uvicorn / vite dev-server. Prefer this file when you
# want a stack that mirrors prod (no host port exposure by default).

services:
  postgres:
    image: postgres:16-alpine
    container_name: fxvol-postgres
    mem_limit: 512m
    restart: unless-stopped
    environment:
      POSTGRES_DB: fxvol
      POSTGRES_USER: fxvol
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    # NOTE : jsonlog destination would write to a file, not stdout —
    # Docker stdout stays plain text by design in postgres:16-alpine.
    # Level extraction is done downstream in obs/promtail.yml via a
    # regex stage matching the `[pid] SEVERITY:` pattern.
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    networks:
      - fxvol-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fxvol -d fxvol"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fxvol-redis
    mem_limit: 320m
    restart: unless-stopped
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    # Auth via --requirepass (never in the committed conf). The dev default is
    # deliberately non-empty so the auth path is always exercised (an empty
    # requirepass silently disables auth); prod sets REDIS_PASSWORD from SSM.
    command: ["redis-server", "/usr/local/etc/redis/redis.conf",
              "--requirepass", "${REDIS_PASSWORD:-fxvol-dev}"]
    environment:
      # redis-cli reads REDISCLI_AUTH — keeps the healthcheck working under auth.
      REDISCLI_AUTH: ${REDIS_PASSWORD:-fxvol-dev}
    networks:
      - fxvol-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    image: ${API_IMAGE:-fx-options-api:local}
    container_name: fxvol-api
    mem_limit: 512m
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://fxvol:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/fxvol
      REDIS_URL: redis://:${REDIS_PASSWORD:-fxvol-dev}@redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Internal URL of the execution-engine container. The api forwards
      # the /orders / /exec/positions actions to this service.
      EXECUTION_URL: http://execution-engine:8001
      # FRED API key for the multi-source events pipeline. Free signup at
      # https://fredaccount.stlouisfed.org/apikeys (~30s). Without it, the
      # FRED source is skipped and only the stub sources run (= no events
      # collected automatically).
      # Cf. docs/vol_trading_pca/events_pipeline_spec.md §8.
      FRED_API_KEY: ${FRED_API_KEY:-}
      # Auth boundary (single-trader). Reads are public; writes need a valid
      # cookie. Login is CLOSED until AUTH_PASSWORD_HASH is set (pbkdf2_hmac
      # sha256 hex of the password, salt=AUTH_SALT). AUTH_COOKIE_SECURE=false
      # for local HTTP; prod sets these from SSM. Cf. src/api/auth.py.
      # Deployment env: "prod" arms the api boot guard (rejects the default
      # AUTH_SECRET + insecure cookies). Local/CI stay "dev" with zero setup.
      ENV: ${ENV:-dev}
      # uvicorn --proxy-headers only trusts X-Forwarded-For from
      # forwarded-allow-ips (default 127.0.0.1) — without this, every public
      # visitor behind nginx shares ONE rate-limit bucket. "*" is safe here:
      # api:8000 is reachable from compose-internal peers only.
      FORWARDED_ALLOW_IPS: "*"
      AUTH_SECRET: ${AUTH_SECRET:-dev-insecure-change-me}
      AUTH_USERNAME: ${AUTH_USERNAME:-trader}
      AUTH_SALT: ${AUTH_SALT:-fxvol}
      AUTH_PASSWORD_HASH: ${AUTH_PASSWORD_HASH:-}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      # PCA model refit cadence (hours). Default weekly (168h); lower it (e.g.
      # 0.1 ≈ 6min) to bootstrap fast locally alongside PCA_SNAPSHOT_INTERVAL_MIN
      # on vol-engine. A refit re-projects the whole snapshot window, so hourly
      # refits churn pca_signal_history — keep it slow in steady state.
      PCA_REFIT_INTERVAL_HOURS: ${PCA_REFIT_INTERVAL_HOURS:-168.0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      fxvol-internal:
        ipv4_address: 172.20.0.13
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s

  market-data:
    build:
      context: .
      dockerfile: src/engines/market_data/Dockerfile
    image: ${MARKET_DATA_IMAGE:-fx-options-market-data:local}
    container_name: fxvol-market-data
    mem_limit: 384m
    # Opt-in with the ``engines`` profile so a plain ``docker compose up``
    # (api demo) does not spin up a live IB connection.
    profiles: ["engines"]
    restart: unless-stopped
    environment:
      SERVICE_NAME: market_data
      IB_HOST: ib-gateway
      # 4004 is the socat relay the ib-gateway image runs in front of TWS's
      # 4002 (socat TCP-LISTEN:4004,fork TCP:127.0.0.1:4002). Connecting
      # straight to 4002 makes TWS see the engine's container IP, which is
      # not in jts.ini TrustedIPs, so it accepts the socket then drops it.
      # Via the relay TWS sees 127.0.0.1, always trusted — and TWS rewrites
      # jts.ini on every boot, so maintaining TrustedIPs by hand never sticks.
      IB_PORT: 4004
      IB_CLIENT_ID: 1
      MARKET_SYMBOL: ${MARKET_SYMBOL:-EURUSD}
      REDIS_URL: redis://:${REDIS_PASSWORD:-fxvol-dev}@redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
      ib-gateway:
        condition: service_started
        required: false
    networks:
      fxvol-internal:
        ipv4_address: 172.20.0.10
    # P0 obs : Prometheus /metrics endpoint, scraped by Prometheus from
    # within fxvol-internal in P1. Spec § Phase 0 step 3.
    expose:
      - "9101"
    healthcheck:
      test:
        - CMD-SHELL
        # The heartbeat is written in ISO-8601 by bus.publisher.set_heartbeat
        # (cf. src/bus/publisher.py). float(ts) on an ISO string crashes —
        # we parse via datetime.fromisoformat. Max age 60s = 60x the push
        # cadence (~1s).
        - "python -c \"import redis, os, sys; from datetime import datetime, timezone; r = redis.Redis.from_url(os.environ['REDIS_URL']); ts = r.get('heartbeat:market_data'); ts_dt = datetime.fromisoformat(ts.decode().replace('Z', '+00:00')) if ts else None; age = (datetime.now(timezone.utc) - ts_dt).total_seconds() if ts_dt else 999; sys.exit(0 if age < 60 else 1)\""
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  vol-engine:
    build:
      context: .
      dockerfile: src/engines/vol/Dockerfile
    image: ${VOL_ENGINE_IMAGE:-fx-options-vol-engine:local}
    container_name: fxvol-vol-engine
    mem_limit: 512m
    profiles: ["engines"]
    restart: unless-stopped
    environment:
      SERVICE_NAME: vol_engine
      IB_HOST: ib-gateway
      # 4004 is the socat relay the ib-gateway image runs in front of TWS's
      # 4002 (socat TCP-LISTEN:4004,fork TCP:127.0.0.1:4002). Connecting
      # straight to 4002 makes TWS see the engine's container IP, which is
      # not in jts.ini TrustedIPs, so it accepts the socket then drops it.
      # Via the relay TWS sees 127.0.0.1, always trusted — and TWS rewrites
      # jts.ini on every boot, so maintaining TrustedIPs by hand never sticks.
      IB_PORT: 4004
      IB_CLIENT_ID: 2
      REDIS_URL: redis://:${REDIS_PASSWORD:-fxvol-dev}@redis:6379/0
      # Min minutes between PCA surface snapshots (default ~hourly = decorrelated
      # samples). Lower it (e.g. 2) to bootstrap the PCA fast locally — pairs with
      # PCA_REFIT_INTERVAL_HOURS on the api. Cf. _maybe_collect_hourly_snapshot.
      PCA_SNAPSHOT_INTERVAL_MIN: ${PCA_SNAPSHOT_INTERVAL_MIN:-55}
      # Step 1 regime gating : vol-engine reads feature_history / events /
      # vrp_table_default at each cycle (cf. STEP1 §7).
      DATABASE_URL: postgresql+asyncpg://fxvol:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/fxvol
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Signal calibration (ex config/vol_config.json, R9 inline en env).
      THRESHOLD_VOL_PTS: ${THRESHOLD_VOL_PTS:-1.0}
      MODEL_P: ${MODEL_P:-har}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      market-data:
        condition: service_started
      ib-gateway:
        condition: service_started
        required: false
    networks:
      fxvol-internal:
        ipv4_address: 172.20.0.11
    # P0 obs : Prometheus /metrics endpoint. Spec § Phase 0 step 3.
    expose:
      - "9102"
    healthcheck:
      test:
        - CMD-SHELL
        # ISO-8601 heartbeat — cf. the market-data healthcheck above.
        # Max age 300s because vol-engine cycle = 30s + 2-5s of GARCH/SVI
        # compute = ~5min tolerated without a push.
        - "python -c \"import redis, os, sys; from datetime import datetime, timezone; r = redis.Redis.from_url(os.environ['REDIS_URL']); ts = r.get('heartbeat:vol_engine'); ts_dt = datetime.fromisoformat(ts.decode().replace('Z', '+00:00')) if ts else None; age = (datetime.now(timezone.utc) - ts_dt).total_seconds() if ts_dt else 999; sys.exit(0 if age < 300 else 1)\""
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 240s

  risk-engine:
    build:
      context: .
      dockerfile: src/engines/risk/Dockerfile
    image: ${RISK_ENGINE_IMAGE:-fx-options-risk-engine:local}
    container_name: fxvol-risk
    mem_limit: 384m
    profiles: ["engines"]
    restart: unless-stopped
    environment:
      SERVICE_NAME: risk_engine
      IB_HOST: ib-gateway
      # 4004 is the socat relay the ib-gateway image runs in front of TWS's
      # 4002 (socat TCP-LISTEN:4004,fork TCP:127.0.0.1:4002). Connecting
      # straight to 4002 makes TWS see the engine's container IP, which is
      # not in jts.ini TrustedIPs, so it accepts the socket then drops it.
      # Via the relay TWS sees 127.0.0.1, always trusted — and TWS rewrites
      # jts.ini on every boot, so maintaining TrustedIPs by hand never sticks.
      IB_PORT: 4004
      IB_CLIENT_ID: 3
      REDIS_URL: redis://:${REDIS_PASSWORD:-fxvol-dev}@redis:6379/0
      DATABASE_URL: postgresql+asyncpg://fxvol:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/fxvol
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      vol-engine:
        condition: service_started
      ib-gateway:
        condition: service_started
        required: false
    networks:
      fxvol-internal:
        ipv4_address: 172.20.0.12
    # P0 obs : Prometheus /metrics endpoint. Spec § Phase 0 step 3.
    expose:
      - "9103"
    healthcheck:
      test:
        - CMD-SHELL
        # Heartbeat ISO-8601 — cf. healthcheck market-data ci-dessus.
        - "python -c \"import redis, os, sys; from datetime import datetime, timezone; r = redis.Redis.from_url(os.environ['REDIS_URL']); ts = r.get('heartbeat:risk_engine'); ts_dt = datetime.fromisoformat(ts.decode().replace('Z', '+00:00')) if ts else None; age = (datetime.now(timezone.utc) - ts_dt).total_seconds() if ts_dt else 999; sys.exit(0 if age < 30 else 1)\""
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  db-writer:
    build:
      context: .
      dockerfile: src/engines/db_writer/Dockerfile
    image: ${DB_WRITER_IMAGE:-fx-options-db-writer:local}
    container_name: fxvol-db-writer
    mem_limit: 384m
    profiles: ["engines"]
    restart: unless-stopped
    environment:
      SERVICE_NAME: db_writer
      DATABASE_URL: postgresql+asyncpg://fxvol:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/fxvol
      REDIS_URL: redis://:${REDIS_PASSWORD:-fxvol-dev}@redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fxvol-internal
    # P0 obs : Prometheus /metrics endpoint. Spec § Phase 0 step 3.
    expose:
      - "9105"
    healthcheck:
      test:
        - CMD-SHELL
        # Heartbeat ISO-8601 — cf. healthcheck market-data ci-dessus.
        - "python -c \"import redis, os, sys; from datetime import datetime, timezone; r = redis.Redis.from_url(os.environ['REDIS_URL']); ts = r.get('heartbeat:db_writer'); ts_dt = datetime.fromisoformat(ts.decode().replace('Z', '+00:00')) if ts else None; age = (datetime.now(timezone.utc) - ts_dt).total_seconds() if ts_dt else 999; sys.exit(0 if age < 30 else 1)\""
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  execution-engine:
    build:
      context: .
      dockerfile: infrastructure/docker/execution.Dockerfile
    image: ${EXECUTION_IMAGE:-fx-options-execution:local}
    container_name: fxvol-execution
    mem_limit: 384m
    profiles: ["engines"]
    restart: unless-stopped
    environment:
      SERVICE_NAME: execution
      DATABASE_URL: postgresql+asyncpg://fxvol:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/fxvol
      REDIS_URL: redis://:${REDIS_PASSWORD:-fxvol-dev}@redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # IB connection — clientId 5 (≠ 1 market-data, 2 vol, 3 risk, 4 reserved for legacy api).
      IB_HOST: ib-gateway
      # 4004 is the socat relay the ib-gateway image runs in front of TWS's
      # 4002 (socat TCP-LISTEN:4004,fork TCP:127.0.0.1:4002). Connecting
      # straight to 4002 makes TWS see the engine's container IP, which is
      # not in jts.ini TrustedIPs, so it accepts the socket then drops it.
      # Via the relay TWS sees 127.0.0.1, always trusted — and TWS rewrites
      # jts.ini on every boot, so maintaining TrustedIPs by hand never sticks.
      IB_PORT: 4004
      IB_CLIENT_ID: 5
      # Must mirror ib-gateway's READ_ONLY_API. A writable ib_insync
      # handshake against a read-only gateway calls reqAutoOpenOrders,
      # which IB rejects (Error 321), so connect never completes and the
      # engine stays down instead of degrading to reads (account summary,
      # positions). Prod runs read-only, so this is the normal path there.
      IB_READ_ONLY: ${READ_ONLY_API:-no}
      # IB → Postgres sync cycle for orders/trades/positions/snapshots.
      # 5 s = compromise: the UI polls every 5 s on the front side, moderate
      # IB load (12 calls/min). Overridable via the EXECUTION_SYNC_INTERVAL_S env var.
      SYNC_INTERVAL_S: ${EXECUTION_SYNC_INTERVAL_S:-5.0}
      # Combo (BAG) execution : atomic all-or-nothing fill, no naked half-fill.
      # OFF by default — the IB PAPER simulator handles BAGs poorly (legs fill then
      # go flat, booking drifts from the account), so the transparent per-leg path
      # is the reliable default + the naked-residual flag surfaces the risk. Set
      # EXECUTION_USE_COMBO=1 to re-enable once validated on a combo-friendly venue.
      EXECUTION_USE_COMBO: ${EXECUTION_USE_COMBO:-0}
      # Reconcile the book to IB : auto-close booked positions the broker no longer
      # holds (guarded against transient/disconnected IB snapshots). Set to 0 to
      # only warn (trade_position_unreconciled) instead of closing.
      RECONCILE_AUTOCLOSE: ${RECONCILE_AUTOCLOSE:-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ib-gateway:
        condition: service_started
        required: false
    networks:
      fxvol-internal:
        ipv4_address: 172.20.0.14
    # P0 obs : Prometheus /metrics endpoint. Spec § Phase 0 step 3.
    expose:
      - "9104"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
    image: ${FRONTEND_IMAGE:-fx-options-frontend:local}
    container_name: fxvol-frontend
    mem_limit: 64m
    restart: unless-stopped
    networks:
      - fxvol-internal
    healthcheck:
      # `wget` ships with nginx:alpine (busybox). Checks that the static
      # bundle is reachable on the internal port 8080.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  ib-gateway:
    # Upstream unusualalpha publishes on ghcr.io but lags behind IB's
    # mandatory version bumps (seen 2026-04-22 : :stable = 10.19.1j
    # refused as obsolete). gnzsnz/ib-gateway is a drop-in fork that
    # rebuilds monthly. For a pinned local build see
    # `infrastructure/ib-gateway/README.md`.
    image: ${IB_GATEWAY_IMAGE:-ghcr.io/gnzsnz/ib-gateway:latest}
    container_name: fxvol-ib-gateway
    mem_limit: 1500m
    # Opt-in : `docker compose --profile ib up -d` to include IB Gateway.
    # Keeps the default `docker compose up` light and avoids the 4002
    # port-bind when another service (or a Windows reserved range) already
    # owns it. The PyQt v1 app continues to connect to localhost:4002,
    # so it must be started explicitly when needed.
    profiles: ["ib"]
    restart: unless-stopped
    environment:
      # Empty-tolerant on purpose: compose interpolates the WHOLE file before
      # profile filtering, so a strict :? here breaks every compose command on
      # hosts without IB creds (prod core-only). Fail-fast is preserved: the
      # gnzsnz entrypoint refuses empty creds when the ib profile actually runs.
      TWS_USERID: ${IB_USERID:-}
      TWS_PASSWORD: ${IB_PASSWORD:-}
      TRADING_MODE: ${TRADING_MODE:-paper}
      READ_ONLY_API: ${READ_ONLY_API:-no}
      # IBC lifecycle : daily auto-logout at 23:59 Paris is cleaner than a
      # weekly one — IB sessions stale silently otherwise.
      TWS_SETTINGS_PATH: /home/ibgateway/Jts
      AUTO_RESTART_TIME: "11:59 PM"
      # 2FA handling : give IBC 3 min for push validation, then restart
      # instead of crash-looping on timeout.
      TWOFA_TIMEOUT_ACTION: restart
      BYPASS_WARNING: "yes"
      # VNC password loaded from SSM via scripts/local/load_secrets.ps1. Empty-
      # tolerant for the same reason as TWS_USERID above (whole-file
      # interpolation); the container only runs with the ib profile armed.
      VNC_SERVER_PASSWORD: ${VNC_PASSWORD:-}
    ports:
      # Bind IB Gateway API port and VNC to 127.0.0.1 only — the PyQt v1
      # app on the host still needs to reach the gateway on localhost:4002,
      # but we do NOT want to expose either port to the LAN.
      - "127.0.0.1:4002:4002"
      - "127.0.0.1:5900:5900"
    networks:
      - fxvol-internal
      - fxvol-external
    volumes:
      # Persist Gateway runtime settings across container recreates.
      # The .ibgzenc encrypted file in $TWS_SETTINGS_PATH/<userid_hash>/
      # is where the GUI Save Settings writes the API config (Trusted
      # IPs, "Allow connections from localhost only", etc.). IBC enforces
      # `TrustedIPs=127.0.0.1` in jts.ini at every boot via its hardcoded
      # SettingsFileEnsurer Java class, but Gateway runtime reads from
      # the .ibgzenc — which we control via this volume.
      #
      # Initial setup (one-shot after first compose up): connect to VNC
      # on 127.0.0.1:5900, Configure → Settings → API → Settings:
      #   - uncheck "Allow connections from localhost only"
      #   - Trusted IPs (one by one, the GUI rejects CIDRs):
      #       127.0.0.1     (loopback, IBC always re-adds it)
      #       172.20.0.10   (market-data, static IP pinned in compose)
      #       172.20.0.11   (vol-engine,  static IP pinned in compose)
      #       172.20.0.12   (risk-engine, static IP pinned in compose)
      #   - OK + File → Save Settings
      # Subsequent boots reload these settings from the volume — no need
      # to touch the GUI again as long as the IPs do not move (and they
      # no longer move, cf. ipam.config.subnet below).
      - ib_gateway_jts:/home/ibgateway/Jts
    healthcheck:
      # tcp probe — gnzsnz/ib-gateway is minimal (no nc, netstat, curl,
      # python3, no bash net-redirections). socat is shipped (used by
      # IBC's VNC bridge) and gives a real TCP probe equivalent to the
      # original `nc -z` intent, catching both JVM death AND the
      # dead-socket-but-live-process state.
      test: ["CMD-SHELL", "socat /dev/null TCP:127.0.0.1:4002,connect-timeout=2 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

  nginx:
    image: nginx:alpine
    container_name: fxvol-nginx
    mem_limit: 64m
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # T2 logs unification : JSON access log format loaded first via
      # alpha-ordered include (00-* before default.conf).
      - ./infrastructure/nginx/log-format-json.conf:/etc/nginx/conf.d/00-log-format.conf:ro
      # Conf is env-driven : dev defaults to the HTTP-only conf ; prod sets
      # NGINX_CONF_FILE=./infrastructure/nginx/nginx.conf (TLS) in /opt/fxvol/.env.
      - ${NGINX_CONF_FILE:-./infrastructure/nginx/nginx-dev.conf}:/etc/nginx/conf.d/default.conf:ro
      - ${LETSENCRYPT_DIR:-./infrastructure/nginx/letsencrypt-empty}:/etc/letsencrypt:ro
      - ${CERTBOT_WWW_DIR:-./infrastructure/nginx/certbot-www-empty}:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - fxvol-public
      - fxvol-internal
    healthcheck:
      # /healthz exists in both confs; plain / follows the prod 301->https
      # and would wedge depends_on.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── P1 obs — LGTM stack (Loki + Grafana + Tempo + Mimir/Prom) ────────
  # Opt-in via `docker compose --profile obs up -d`. All 4 services live
  # on fxvol-internal so Prometheus reaches the engine /metrics ports
  # without any host-side mapping. Grafana also gets fxvol-public for
  # browser access.
  #
  # `metrics` is a deliberate SUBSET of `obs`: prometheus + cadvisor only,
  # i.e. exactly what the /dev Hardware tab needs to plot per-container
  # CPU/RAM. It exists so prod can have those graphs WITHOUT the parts that
  # must not run on a public host — Grafana (host-mapped :3000, anonymous
  # viewer on by default) and promtail (read-write docker.sock). Both
  # services list the two profiles, so `--profile obs` still starts the
  # full LGTM set exactly as before.

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: fxvol-prometheus
    profiles: ["obs", "metrics"]
    # Measured ~91 MB with the full 17-container local stack; the prod box is
    # a t3.small (2 GB) running core-only, so the ceiling is ~3x headroom.
    mem_limit: 256m
    restart: unless-stopped
    volumes:
      - ./obs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    command:
      # Retention is env-tunable because the same file serves a 16 GB laptop
      # and a 2 GB EC2 box. The default is the prod-safe one — raise it in a
      # local .env if you want a longer local history.
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROM_RETENTION_TIME:-7d}'
      - '--storage.tsdb.retention.size=${PROM_RETENTION_SIZE:-512MB}'
      - '--web.enable-lifecycle'
    networks:
      - fxvol-internal
    expose:
      - "9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Per-container CPU/RAM/net/fs metrics → scraped by Prometheus. The standard
  # way to graph "how much does each container consume" (locally + on EC2).
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: fxvol-cadvisor
    profiles: ["obs", "metrics"]
    # Measured ~21 MB locally. NOTE: on Docker Desktop / WSL2 cAdvisor only
    # sees the root cgroup, so it reports nothing per-container and the api
    # falls back to the docker.sock path (dev override). On a real Linux
    # kernel (EC2) this is the path that actually serves the Hardware tab.
    mem_limit: 128m
    restart: unless-stopped
    privileged: true
    command:
      - '--housekeeping_interval=10s'
      - '--docker_only=true'
      - '--store_container_labels=false'
    # NOTE: per-container metrics require the host's Docker to use the CLASSIC
    # overlay2 image store, NOT the containerd image store (storage driver
    # "overlayfs"). With the containerd store cAdvisor v0.49.x can't resolve each
    # container's read-write layer and, under --docker_only, fails registration —
    # the Hardware tab then shows nothing. setup.sh pins overlay2 via
    # daemon.json {"features":{"containerd-snapshotter":false}}.
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - fxvol-internal
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  loki:
    image: grafana/loki:3.2.0
    container_name: fxvol-loki
    profiles: ["obs"]
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./obs/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - fxvol-internal
    expose:
      - "3100"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s

  promtail:
    image: grafana/promtail:3.2.0
    container_name: fxvol-promtail
    profiles: ["obs"]
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./obs/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      # started, NOT healthy: promtail retries pushing to Loki, so waiting on
      # Loki's slow health (start_period 45s) only made `up` race and fail.
      loki:
        condition: service_started
    networks:
      - fxvol-internal

  tempo:
    image: grafana/tempo:2.6.0
    container_name: fxvol-tempo
    profiles: ["obs"]
    restart: unless-stopped
    command: -config.file=/etc/tempo.yml
    volumes:
      - ./obs/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo
    networks:
      - fxvol-internal
    expose:
      - "3200"   # Tempo HTTP query
      - "4317"   # OTLP gRPC ingest (from otel-collector)
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: fxvol-otel-collector
    profiles: ["obs"]
    restart: unless-stopped
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./obs/otel-collector.yml:/etc/otel-collector.yml:ro
    depends_on:
      # started, NOT healthy: the collector retries its OTLP export to Tempo, so
      # it needn't wait on Tempo's health (start_period 30s) — that raced `up`.
      tempo:
        condition: service_started
    networks:
      - fxvol-internal
    expose:
      - "4317"   # OTLP gRPC receiver (engines send here)

  grafana:
    image: grafana/grafana-oss:11.3.0
    container_name: fxvol-grafana
    profiles: ["obs"]
    restart: unless-stopped
    environment:
      # Anonymous access is view-only; edits/admin go through the login form.
      # Never Admin, even in dev. The obs profile itself must NOT run on the
      # public prod host until Grafana sits behind the nginx auth layer
      # (also keeps cadvisor privileged + promtail docker.sock off the box).
      GF_AUTH_ANONYMOUS_ENABLED: ${GF_AUTH_ANONYMOUS_ENABLED:-true}
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SECURITY_ALLOW_EMBEDDING: "false"
      GF_SECURITY_COOKIE_SAMESITE: "lax"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./obs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./obs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      # started, NOT healthy: Grafana retries its datasource connections, so it
      # doesn't need Prometheus/Loki healthy at boot — waiting on Loki's slow
      # health (start_period 45s) is what made `up` fail while everything else
      # came up. Grafana's own healthcheck still gates anything depending on IT.
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    networks:
      - fxvol-internal
    # Host port 3000 mapping for direct browser access in dev.
    # On EC2 prod, remove this mapping and go through the nginx reverse-proxy.
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  # Exposed to the public internet — only nginx lives here (R6 PR #3).
  fxvol-public:
    driver: bridge
  # Back-of-house services that only talk to each other (api, postgres,
  # redis, frontend bundle server, ib-gateway).
  fxvol-internal:
    driver: bridge
    internal: false
    # Subnet pinned so that the engines get stable, readable IPs that can
    # be trusted once and for all on the IB Gateway side. Without it Docker
    # picks a random range in 172.17-31, and every `compose down` can change
    # the subnet → stale TrustedIPs whitelist.
    ipam:
      config:
        # ip_range is MANDATORY: without it Docker auto-assigns the dynamic IPs
        # (db-writer, nginx, promtail, grafana…) across the whole /24 starting at .2,
        # and grabs .10/.11/.12/.13/.14 — the engines' pinned static IPs.
        # The 1st engine that wants its .10 then crashes with "Address already in use".
        # So we confine the dynamic pool to the upper half (.128–.254) and keep
        # .2–.127 reserved for the static pins above (engines + api + execution).
        - subnet: 172.20.0.0/24
          ip_range: 172.20.0.128/25
  # Outbound-only lane for IB Gateway — lets it reach IB servers while
  # keeping the rest of the stack isolated from the wider internet.
  fxvol-external:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  # IB Gateway settings persistence — see § ib-gateway above.
  ib_gateway_jts:
  # P1 obs — LGTM stack persistent storage.
  prom_data:
  loki_data:
  grafana_data:
  # P2 obs — Tempo traces storage (7 days retention).
  tempo_data:
