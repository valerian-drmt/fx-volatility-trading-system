# Production-like compose file. Ships the full v2 stack across three
# networks (public / internal / external) so downstream PRs can just
# attach new services (api, frontend, nginx, ib-gateway) without
# reworking the topology.
#
# Dev quick-iter continues to live in docker-compose.dev.yml — that one
# only exposes postgres + redis on host ports so the app code can run
# on the host with uvicorn / vite dev-server. Prefer this file when you
# want a stack that mirrors prod (no host port exposure by default).

services:
  postgres:
    image: postgres:16-alpine
    container_name: fxvol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fxvol
      POSTGRES_USER: fxvol
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    # NOTE : jsonlog destination would write to a file, not stdout —
    # Docker stdout stays plain text by design in postgres:16-alpine.
    # Level extraction is done downstream in obs/promtail.yml via a
    # regex stage matching the `[pid] SEVERITY:` pattern.
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    networks:
      - fxvol-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fxvol -d fxvol"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fxvol-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      - fxvol-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    image: ${API_IMAGE:-fx-options-api:local}
    container_name: fxvol-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://fxvol:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/fxvol
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # URL interne du nouveau container execution-engine. L'api forward
      # les actions /orders / /exec/positions vers ce service.
      EXECUTION_URL: http://execution-engine:8001
      # FRED API key for the multi-source events pipeline. Free signup at
      # https://fredaccount.stlouisfed.org/apikeys (~30s). Without it, the
      # FRED source is skipped and only the stub sources run (= no events
      # collected automatically — fallback is scripts/db/seed_events_manual.py).
      # Cf. docs/vol_trading_pca/events_pipeline_spec.md §8.
      FRED_API_KEY: ${FRED_API_KEY:-}
      # Auth boundary (single-trader). Reads are public; writes need a valid
      # cookie. Login is CLOSED until AUTH_PASSWORD_HASH is set (pbkdf2_hmac
      # sha256 hex of the password, salt=AUTH_SALT). AUTH_COOKIE_SECURE=false
      # for local HTTP; prod sets these from SSM. Cf. src/api/auth.py.
      AUTH_SECRET: ${AUTH_SECRET:-dev-insecure-change-me}
      AUTH_USERNAME: ${AUTH_USERNAME:-trader}
      AUTH_SALT: ${AUTH_SALT:-fxvol}
      AUTH_PASSWORD_HASH: ${AUTH_PASSWORD_HASH:-}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      # PCA model refit cadence (hours). Default weekly (168h); lower it (e.g.
      # 0.1 ≈ 6min) to bootstrap fast locally alongside PCA_SNAPSHOT_INTERVAL_MIN
      # on vol-engine. A refit re-projects the whole snapshot window, so hourly
      # refits churn pca_signal_history — keep it slow in steady state.
      PCA_REFIT_INTERVAL_HOURS: ${PCA_REFIT_INTERVAL_HOURS:-168.0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      fxvol-internal:
        ipv4_address: 172.20.0.13
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s

  market-data:
    build:
      context: .
      dockerfile: src/engines/market_data/Dockerfile
    image: ${MARKET_DATA_IMAGE:-fx-options-market-data:local}
    container_name: fxvol-market-data
    # Opt-in with the ``engines`` profile so a plain ``docker compose up``
    # (api demo) does not spin up a live IB connection.
    profiles: ["engines"]
    restart: unless-stopped
    environment:
      SERVICE_NAME: market_data
      IB_HOST: ib-gateway
      IB_PORT: 4002
      IB_CLIENT_ID: 1
      MARKET_SYMBOL: ${MARKET_SYMBOL:-EURUSD}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
      ib-gateway:
        condition: service_started
        required: false
    networks:
      fxvol-internal:
        ipv4_address: 172.20.0.10
    # P0 obs : Prometheus /metrics endpoint, scraped by Prometheus from
    # within fxvol-internal in P1. Spec § Phase 0 step 3.
    expose:
      - "9101"
    healthcheck:
      test:
        - CMD-SHELL
        # Heartbeat est écrit en ISO-8601 par bus.publisher.set_heartbeat
        # (cf. src/bus/publisher.py). float(ts) sur une string ISO crash —
        # on parse via datetime.fromisoformat. Max age 60s = 60× la cadence
        # de push (~1s).
        - "python -c \"import redis, os, sys; from datetime import datetime, timezone; r = redis.Redis.from_url(os.environ['REDIS_URL']); ts = r.get('heartbeat:market_data'); ts_dt = datetime.fromisoformat(ts.decode().replace('Z', '+00:00')) if ts else None; age = (datetime.now(timezone.utc) - ts_dt).total_seconds() if ts_dt else 999; sys.exit(0 if age < 60 else 1)\""
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  vol-engine:
    build:
      context: .
      dockerfile: src/engines/vol/Dockerfile
    image: ${VOL_ENGINE_IMAGE:-fx-options-vol-engine:local}
    container_name: fxvol-vol-engine
    profiles: ["engines"]
    restart: unless-stopped
    environment:
      SERVICE_NAME: vol_engine
      IB_HOST: ib-gateway
      IB_PORT: 4002
      IB_CLIENT_ID: 2
      REDIS_URL: redis://redis:6379/0
      # Min minutes between PCA surface snapshots (default ~hourly = decorrelated
      # samples). Lower it (e.g. 2) to bootstrap the PCA fast locally — pairs with
      # PCA_REFIT_INTERVAL_HOURS on the api. Cf. _maybe_collect_hourly_snapshot.
      PCA_SNAPSHOT_INTERVAL_MIN: ${PCA_SNAPSHOT_INTERVAL_MIN:-55}
      # Step 1 regime gating : vol-engine reads feature_history / events /
      # vrp_table_default at each cycle (cf. STEP1 §7).
      DATABASE_URL: postgresql+asyncpg://fxvol:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/fxvol
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Signal calibration (ex config/vol_config.json, R9 inline en env).
      THRESHOLD_VOL_PTS: ${THRESHOLD_VOL_PTS:-1.0}
      MODEL_P: ${MODEL_P:-har}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      market-data:
        condition: service_started
      ib-gateway:
        condition: service_started
        required: false
    networks:
      fxvol-internal:
        ipv4_address: 172.20.0.11
    # P0 obs : Prometheus /metrics endpoint. Spec § Phase 0 step 3.
    expose:
      - "9102"
    healthcheck:
      test:
        - CMD-SHELL
        # Heartbeat ISO-8601 — cf. healthcheck market-data ci-dessus.
        # Max age 300s parce que vol-engine cycle = 30s + 2-5s de calc
        # GARCH/SVI = ~5min toléré sans push.
        - "python -c \"import redis, os, sys; from datetime import datetime, timezone; r = redis.Redis.from_url(os.environ['REDIS_URL']); ts = r.get('heartbeat:vol_engine'); ts_dt = datetime.fromisoformat(ts.decode().replace('Z', '+00:00')) if ts else None; age = (datetime.now(timezone.utc) - ts_dt).total_seconds() if ts_dt else 999; sys.exit(0 if age < 300 else 1)\""
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 240s

  risk-engine:
    build:
      context: .
      dockerfile: src/engines/risk/Dockerfile
    image: ${RISK_ENGINE_IMAGE:-fx-options-risk-engine:local}
    container_name: fxvol-risk
    profiles: ["engines"]
    restart: unless-stopped
    environment:
      SERVICE_NAME: risk_engine
      IB_HOST: ib-gateway
      IB_PORT: 4002
      IB_CLIENT_ID: 3
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://fxvol:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/fxvol
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      vol-engine:
        condition: service_started
      ib-gateway:
        condition: service_started
        required: false
    networks:
      fxvol-internal:
        ipv4_address: 172.20.0.12
    # P0 obs : Prometheus /metrics endpoint. Spec § Phase 0 step 3.
    expose:
      - "9103"
    healthcheck:
      test:
        - CMD-SHELL
        # Heartbeat ISO-8601 — cf. healthcheck market-data ci-dessus.
        - "python -c \"import redis, os, sys; from datetime import datetime, timezone; r = redis.Redis.from_url(os.environ['REDIS_URL']); ts = r.get('heartbeat:risk_engine'); ts_dt = datetime.fromisoformat(ts.decode().replace('Z', '+00:00')) if ts else None; age = (datetime.now(timezone.utc) - ts_dt).total_seconds() if ts_dt else 999; sys.exit(0 if age < 30 else 1)\""
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  db-writer:
    build:
      context: .
      dockerfile: src/engines/db_writer/Dockerfile
    image: ${DB_WRITER_IMAGE:-fx-options-db-writer:local}
    container_name: fxvol-db-writer
    profiles: ["engines"]
    restart: unless-stopped
    environment:
      SERVICE_NAME: db_writer
      DATABASE_URL: postgresql+asyncpg://fxvol:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/fxvol
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fxvol-internal
    # P0 obs : Prometheus /metrics endpoint. Spec § Phase 0 step 3.
    expose:
      - "9105"
    healthcheck:
      test:
        - CMD-SHELL
        # Heartbeat ISO-8601 — cf. healthcheck market-data ci-dessus.
        - "python -c \"import redis, os, sys; from datetime import datetime, timezone; r = redis.Redis.from_url(os.environ['REDIS_URL']); ts = r.get('heartbeat:db_writer'); ts_dt = datetime.fromisoformat(ts.decode().replace('Z', '+00:00')) if ts else None; age = (datetime.now(timezone.utc) - ts_dt).total_seconds() if ts_dt else 999; sys.exit(0 if age < 30 else 1)\""
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  execution-engine:
    build:
      context: .
      dockerfile: infrastructure/docker/execution.Dockerfile
    image: ${EXECUTION_IMAGE:-fx-options-execution:local}
    container_name: fxvol-execution
    profiles: ["engines"]
    restart: unless-stopped
    environment:
      SERVICE_NAME: execution
      DATABASE_URL: postgresql+asyncpg://fxvol:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/fxvol
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # IB connection — clientId 5 (≠ 1 market-data, 2 vol, 3 risk, 4 réservé api legacy).
      IB_HOST: ib-gateway
      IB_PORT: 4002
      IB_CLIENT_ID: 5
      # Cycle de sync IB → Postgres pour orders/trades/positions/snapshots.
      # 5 s = compromis : UI poll à 5 s côté front, charge IB modérée
      # (12 calls/min). Surchargeable via la var d'env EXECUTION_SYNC_INTERVAL_S.
      SYNC_INTERVAL_S: ${EXECUTION_SYNC_INTERVAL_S:-5.0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ib-gateway:
        condition: service_started
        required: false
    networks:
      fxvol-internal:
        ipv4_address: 172.20.0.14
    # P0 obs : Prometheus /metrics endpoint. Spec § Phase 0 step 3.
    expose:
      - "9104"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
    image: ${FRONTEND_IMAGE:-fx-options-frontend:local}
    container_name: fxvol-frontend
    restart: unless-stopped
    networks:
      - fxvol-internal
    healthcheck:
      # `wget` ship avec nginx:alpine (busybox). Vérifie que le bundle static
      # est accessible sur le port interne 8080.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  ib-gateway:
    # Upstream unusualalpha publishes on ghcr.io but lags behind IB's
    # mandatory version bumps (seen 2026-04-22 : :stable = 10.19.1j
    # refused as obsolete). gnzsnz/ib-gateway is a drop-in fork that
    # rebuilds monthly. For a pinned local build see
    # `infrastructure/ib-gateway/README.md`.
    image: ${IB_GATEWAY_IMAGE:-ghcr.io/gnzsnz/ib-gateway:latest}
    container_name: fxvol-ib-gateway
    # Opt-in : `docker compose --profile ib up -d` to include IB Gateway.
    # Keeps the default `docker compose up` light and avoids the 4002
    # port-bind when another service (or a Windows reserved range) already
    # owns it. The PyQt v1 app continues to connect to localhost:4002,
    # so it must be started explicitly when needed.
    profiles: ["ib"]
    restart: unless-stopped
    environment:
      TWS_USERID: ${IB_USERID:?IB_USERID is required (load via scripts/ops/load_secrets.ps1)}
      TWS_PASSWORD: ${IB_PASSWORD:?IB_PASSWORD is required (load via scripts/ops/load_secrets.ps1)}
      TRADING_MODE: ${TRADING_MODE:-paper}
      READ_ONLY_API: ${READ_ONLY_API:-no}
      # IBC lifecycle : daily auto-logout at 23:59 Paris is cleaner than a
      # weekly one — IB sessions stale silently otherwise.
      TWS_SETTINGS_PATH: /home/ibgateway/Jts
      AUTO_RESTART_TIME: "11:59 PM"
      # 2FA handling : give IBC 3 min for push validation, then restart
      # instead of crash-looping on timeout.
      TWOFA_TIMEOUT_ACTION: restart
      BYPASS_WARNING: "yes"
      # VNC password loaded from SSM via scripts/ops/load_secrets.ps1 — strict
      # check (every `docker compose up` must have the var set, no fallback).
      VNC_SERVER_PASSWORD: ${VNC_PASSWORD:?VNC_PASSWORD is required (load via scripts/ops/load_secrets.ps1)}
    ports:
      # Bind IB Gateway API port and VNC to 127.0.0.1 only — the PyQt v1
      # app on the host still needs to reach the gateway on localhost:4002,
      # but we do NOT want to expose either port to the LAN.
      - "127.0.0.1:4002:4002"
      - "127.0.0.1:5900:5900"
    networks:
      - fxvol-internal
      - fxvol-external
    volumes:
      # Persist Gateway runtime settings across container recreates.
      # The .ibgzenc encrypted file in $TWS_SETTINGS_PATH/<userid_hash>/
      # is where the GUI Save Settings writes the API config (Trusted
      # IPs, "Allow connections from localhost only", etc.). IBC enforces
      # `TrustedIPs=127.0.0.1` in jts.ini at every boot via its hardcoded
      # SettingsFileEnsurer Java class, but Gateway runtime reads from
      # the .ibgzenc — which we control via this volume.
      #
      # Initial setup (one-shot after first compose up): connect to VNC
      # on 127.0.0.1:5900, Configure → Settings → API → Settings:
      #   - uncheck "Allow connections from localhost only"
      #   - Trusted IPs (1 par 1, le GUI refuse les CIDR) :
      #       127.0.0.1     (loopback, IBC le ré-ajoute toujours)
      #       172.20.0.10   (market-data, IP statique pinnée compose)
      #       172.20.0.11   (vol-engine,  IP statique pinnée compose)
      #       172.20.0.12   (risk-engine, IP statique pinnée compose)
      #   - OK + File → Save Settings
      # Subsequent boots reload these settings from the volume — pas
      # besoin de retoucher la GUI tant que les IPs ne bougent pas
      # (et elles ne bougent plus, cf. ipam.config.subnet ci-dessous).
      - ib_gateway_jts:/home/ibgateway/Jts
    healthcheck:
      # tcp probe — gnzsnz/ib-gateway is minimal (no nc, netstat, curl,
      # python3, no bash net-redirections). socat is shipped (used by
      # IBC's VNC bridge) and gives a real TCP probe equivalent to the
      # original `nc -z` intent, catching both JVM death AND the
      # dead-socket-but-live-process state.
      test: ["CMD-SHELL", "socat /dev/null TCP:127.0.0.1:4002,connect-timeout=2 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

  nginx:
    image: nginx:alpine
    container_name: fxvol-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # T2 logs unification : JSON access log format loaded first via
      # alpha-ordered include (00-* before default.conf).
      - ./infrastructure/nginx/log-format-json.conf:/etc/nginx/conf.d/00-log-format.conf:ro
      - ./infrastructure/nginx/nginx-dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - fxvol-public
      - fxvol-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── P1 obs — LGTM stack (Loki + Grafana + Tempo + Mimir/Prom) ────────
  # Opt-in via `docker compose --profile obs up -d`. All 4 services live
  # on fxvol-internal so Prometheus reaches the engine /metrics ports
  # without any host-side mapping. Grafana also gets fxvol-public for
  # browser access.

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: fxvol-prometheus
    profiles: ["obs"]
    restart: unless-stopped
    volumes:
      - ./obs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=2GB'
      - '--web.enable-lifecycle'
    networks:
      - fxvol-internal
    expose:
      - "9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Per-container CPU/RAM/net/fs metrics → scraped by Prometheus. The standard
  # way to graph "how much does each container consume" (locally + on EC2).
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: fxvol-cadvisor
    profiles: ["obs"]
    restart: unless-stopped
    privileged: true
    command:
      - '--housekeeping_interval=10s'
      - '--docker_only=true'
      - '--store_container_labels=false'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - fxvol-internal
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  loki:
    image: grafana/loki:3.2.0
    container_name: fxvol-loki
    profiles: ["obs"]
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./obs/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - fxvol-internal
    expose:
      - "3100"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s

  promtail:
    image: grafana/promtail:3.2.0
    container_name: fxvol-promtail
    profiles: ["obs"]
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./obs/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - fxvol-internal

  tempo:
    image: grafana/tempo:2.6.0
    container_name: fxvol-tempo
    profiles: ["obs"]
    restart: unless-stopped
    command: -config.file=/etc/tempo.yml
    volumes:
      - ./obs/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo
    networks:
      - fxvol-internal
    expose:
      - "3200"   # Tempo HTTP query
      - "4317"   # OTLP gRPC ingest (from otel-collector)
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: fxvol-otel-collector
    profiles: ["obs"]
    restart: unless-stopped
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./obs/otel-collector.yml:/etc/otel-collector.yml:ro
    depends_on:
      tempo:
        condition: service_healthy
    networks:
      - fxvol-internal
    expose:
      - "4317"   # OTLP gRPC receiver (engines send here)

  grafana:
    image: grafana/grafana-oss:11.3.0
    container_name: fxvol-grafana
    profiles: ["obs"]
    restart: unless-stopped
    environment:
      # Dev-only : anonymous admin. EC2 prod doit désactiver
      # GF_AUTH_ANONYMOUS_ENABLED et configurer basic auth ou OAuth
      # (cf. spec § Phase 1 anti-patterns).
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SAMESITE: "lax"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./obs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./obs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks:
      - fxvol-internal
    # Host port 3000 mapping pour ouverture browser directe en dev.
    # En EC2 prod, retirer ce mapping et passer par nginx reverse-proxy.
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  # Exposed to the public internet — only nginx lives here (R6 PR #3).
  fxvol-public:
    driver: bridge
  # Back-of-house services that only talk to each other (api, postgres,
  # redis, frontend bundle server, ib-gateway).
  fxvol-internal:
    driver: bridge
    internal: false
    # Subnet pinné pour que les engines aient des IPs stables, lisibles
    # et trustables une seule fois côté IB Gateway. Sans ça Docker pioche
    # un range au hasard dans 172.17-31, et chaque `compose down` peut
    # changer le subnet → TrustedIPs whitelist obsolète.
    ipam:
      config:
        # ip_range OBLIGATOIRE : sans lui Docker auto-assigne les IPs dynamiques
        # (db-writer, nginx, promtail, grafana…) sur tout le /24 en partant de .2,
        # et grappille .10/.11/.12/.13/.14 — les IPs statiques pinnées des engines.
        # Le 1er engine qui veut son .10 crashe alors "Address already in use".
        # On confine donc le pool dynamique à la moitié haute (.128–.254) et on
        # réserve .2–.127 aux pins statiques ci-dessus (engines + api + execution).
        - subnet: 172.20.0.0/24
          ip_range: 172.20.0.128/25
  # Outbound-only lane for IB Gateway — lets it reach IB servers while
  # keeping the rest of the stack isolated from the wider internet.
  fxvol-external:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  # IB Gateway settings persistence — see § ib-gateway above.
  ib_gateway_jts:
  # P1 obs — LGTM stack persistent storage.
  prom_data:
  loki_data:
  grafana_data:
  # P2 obs — Tempo traces storage (7 days retention).
  tempo_data:
