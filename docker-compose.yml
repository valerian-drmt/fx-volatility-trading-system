# Production-like compose file. Ships the full v2 stack across three
# networks (public / internal / external) so downstream PRs can just
# attach new services (api, frontend, nginx, ib-gateway) without
# reworking the topology.
#
# Dev quick-iter continues to live in docker-compose.dev.yml — that one
# only exposes postgres + redis on host ports so the app code can run
# on the host with uvicorn / vite dev-server. Prefer this file when you
# want a stack that mirrors prod (no host port exposure by default).

services:
  postgres:
    image: postgres:16-alpine
    container_name: fxvol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fxvol
      POSTGRES_USER: fxvol
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    # NOTE : jsonlog destination would write to a file, not stdout —
    # Docker stdout stays plain text by design in postgres:16-alpine.
    # Level extraction is done downstream in obs/promtail.yml via a
    # regex stage matching the `[pid] SEVERITY:` pattern.
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    networks:
      - fxvol-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fxvol -d fxvol"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fxvol-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      - fxvol-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    image: ${API_IMAGE:-fx-options-api:local}
    container_name: fxvol-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://fxvol:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/fxvol
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Auth (single-trader write boundary). Reads stay public; writes need a
      # valid auth cookie. Defaults below = safe local dev (HTTP, login fails
      # until AUTH_PASSWORD_HASH is set). Prod overrides via .env from SSM.
      AUTH_SECRET: ${AUTH_SECRET:-dev-insecure-change-me}
      AUTH_USERNAME: ${AUTH_USERNAME:-trader}
      AUTH_PASSWORD_HASH: ${AUTH_PASSWORD_HASH:-}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fxvol-internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s

  market-data:
    build:
      context: .
      dockerfile: src/engines/market_data/Dockerfile
    image: ${MARKET_DATA_IMAGE:-fx-options-market-data:local}
    container_name: fxvol-market-data
    # Opt-in with the ``engines`` profile so a plain ``docker compose up``
    # (api demo) does not spin up a live IB connection.
    profiles: ["engines"]
    restart: unless-stopped
    environment:
      SERVICE_NAME: market_data
      IB_HOST: ib-gateway
      IB_PORT: 4002
      IB_CLIENT_ID: 1
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
      ib-gateway:
        condition: service_started
        required: false
    networks:
      - fxvol-internal
    # P0 obs : Prometheus /metrics endpoint, scraped by Prometheus from
    # within fxvol-internal in P1. Spec § Phase 0 step 3.
    expose:
      - "9101"
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import redis, os, time; r = redis.Redis.from_url(os.environ['REDIS_URL']); ts = r.get('heartbeat:market_data'); import sys; sys.exit(0 if (ts and time.time() - float(ts) < 60) else 1)\""
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  vol-engine:
    build:
      context: .
      dockerfile: src/engines/vol/Dockerfile
    image: ${VOL_ENGINE_IMAGE:-fx-options-vol-engine:local}
    container_name: fxvol-vol-engine
    profiles: ["engines"]
    restart: unless-stopped
    environment:
      SERVICE_NAME: vol_engine
      IB_HOST: ib-gateway
      IB_PORT: 4002
      IB_CLIENT_ID: 2
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
      market-data:
        condition: service_started
      ib-gateway:
        condition: service_started
        required: false
    networks:
      - fxvol-internal
    # P0 obs : Prometheus /metrics endpoint. Spec § Phase 0 step 3.
    expose:
      - "9102"
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import redis, os, time; r = redis.Redis.from_url(os.environ['REDIS_URL']); ts = r.get('heartbeat:vol_engine'); import sys; sys.exit(0 if (ts and time.time() - float(ts) < 300) else 1)\""
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 240s

  risk-engine:
    build:
      context: .
      dockerfile: src/engines/risk/Dockerfile
    image: ${RISK_ENGINE_IMAGE:-fx-options-risk-engine:local}
    container_name: fxvol-risk-engine
    profiles: ["engines"]
    restart: unless-stopped
    environment:
      SERVICE_NAME: risk_engine
      IB_HOST: ib-gateway
      IB_PORT: 4002
      IB_CLIENT_ID: 3
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
      vol-engine:
        condition: service_started
      ib-gateway:
        condition: service_started
        required: false
    networks:
      - fxvol-internal
    # P0 obs : Prometheus /metrics endpoint. Spec § Phase 0 step 3.
    expose:
      - "9103"
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import redis, os, time; r = redis.Redis.from_url(os.environ['REDIS_URL']); ts = r.get('heartbeat:risk_engine'); import sys; sys.exit(0 if (ts and time.time() - float(ts) < 30) else 1)\""
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  db-writer:
    build:
      context: .
      dockerfile: src/engines/db_writer/Dockerfile
    image: ${DB_WRITER_IMAGE:-fx-options-db-writer:local}
    container_name: fxvol-db-writer
    profiles: ["engines"]
    restart: unless-stopped
    environment:
      SERVICE_NAME: db_writer
      DATABASE_URL: postgresql+asyncpg://fxvol:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/fxvol
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fxvol-internal
    # P0 obs : Prometheus /metrics endpoint. Spec § Phase 0 step 3.
    expose:
      - "9105"
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import redis, os, time; r = redis.Redis.from_url(os.environ['REDIS_URL']); ts = r.get('heartbeat:db_writer'); import sys; sys.exit(0 if (ts and time.time() - float(ts) < 30) else 1)\""
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
    image: ${FRONTEND_IMAGE:-fx-options-frontend:local}
    container_name: fxvol-frontend
    restart: unless-stopped
    networks:
      - fxvol-internal
    healthcheck:
      # `wget` ship avec nginx:alpine (busybox). Vérifie que le bundle static
      # est accessible sur le port interne 8080.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  ib-gateway:
    image: ghcr.io/unusualalpha/ib-gateway:stable
    container_name: fxvol-ib-gateway
    # Opt-in : `docker compose --profile ib up -d` to include IB Gateway.
    # Keeps the default `docker compose up` light and avoids the 4002
    # port-bind when another service (or a Windows reserved range) already
    # owns it. The PyQt v1 app continues to connect to localhost:4002,
    # so it must be started explicitly when needed.
    profiles: ["ib"]
    restart: unless-stopped
    environment:
      TWS_USERID: ${IB_USERID:-}
      TWS_PASSWORD: ${IB_PASSWORD:-}
      TRADING_MODE: paper
      # IBC lifecycle : daily auto-logout at 23:59 Paris is cleaner than a
      # weekly one — IB sessions stale silently otherwise.
      TWS_SETTINGS_PATH: /home/ibgateway/Jts
      AUTO_RESTART_TIME: "11:59 PM"
      # VNC is only used when the ib profile is active — IBC demands a non-empty
      # password so we fall through to a dev default rather than erroring at
      # parse time on every `docker compose up` (profiles are evaluated later).
      VNC_SERVER_PASSWORD: ${VNC_PASSWORD:-change-me-in-dotenv}
    ports:
      # Bind IB Gateway API port and VNC to 127.0.0.1 only — the PyQt v1
      # app on the host still needs to reach the gateway on localhost:4002,
      # but we do NOT want to expose either port to the LAN.
      - "127.0.0.1:4002:4002"
      - "127.0.0.1:5900:5900"
    networks:
      - fxvol-internal
      - fxvol-external
    healthcheck:
      # tcp probe — IB Gateway does not ship a cheap HTTP endpoint.
      test: ["CMD-SHELL", "nc -z 127.0.0.1 4002 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

  nginx:
    image: nginx:alpine
    container_name: fxvol-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # T2 logs unification : JSON access log format loaded first via
      # alpha-ordered include (00-* before default.conf).
      - ./infrastructure/nginx/log-format-json.conf:/etc/nginx/conf.d/00-log-format.conf:ro
      # Conf is env-driven : dev defaults to the HTTP-only conf ; prod sets
      # NGINX_CONF_FILE=./infrastructure/nginx/nginx.conf (TLS) in /opt/fxvol/.env.
      - ${NGINX_CONF_FILE:-./infrastructure/nginx/nginx-dev.conf}:/etc/nginx/conf.d/default.conf:ro
      # Let's Encrypt + ACME webroot. Dev → empty committed dirs (harmless, the
      # dev conf has no TLS) ; prod → host /etc/letsencrypt + /var/www/certbot
      # (host certbot writes there ; the renewal cron reloads this container).
      - ${LETSENCRYPT_DIR:-./infrastructure/nginx/letsencrypt-empty}:/etc/letsencrypt:ro
      - ${CERTBOT_WWW_DIR:-./infrastructure/nginx/certbot-www-empty}:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - fxvol-public
      - fxvol-internal
    healthcheck:
      # /healthz returns 200 on :80 without the prod HTTPS redirect (which made
      # the old `wget /` check fail → container marked unhealthy though serving).
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── P1 obs — LGTM stack (Loki + Grafana + Tempo + Mimir/Prom) ────────
  # Opt-in via `docker compose --profile obs up -d`. All 4 services live
  # on fxvol-internal so Prometheus reaches the engine /metrics ports
  # without any host-side mapping. Grafana also gets fxvol-public for
  # browser access. Spec : docs/LGTM_IMPLEMENTATION_SPEC.md § Phase 1.

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: fxvol-prometheus
    profiles: ["obs"]
    restart: unless-stopped
    volumes:
      - ./obs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=2GB'
      - '--web.enable-lifecycle'
    networks:
      - fxvol-internal
    expose:
      - "9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  loki:
    image: grafana/loki:3.2.0
    container_name: fxvol-loki
    profiles: ["obs"]
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./obs/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - fxvol-internal
    expose:
      - "3100"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s

  promtail:
    image: grafana/promtail:3.2.0
    container_name: fxvol-promtail
    profiles: ["obs"]
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./obs/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - fxvol-internal

  tempo:
    image: grafana/tempo:2.6.0
    container_name: fxvol-tempo
    profiles: ["obs"]
    restart: unless-stopped
    command: -config.file=/etc/tempo.yml
    volumes:
      - ./obs/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo
    networks:
      - fxvol-internal
    expose:
      - "3200"   # Tempo HTTP query
      - "4317"   # OTLP gRPC ingest (from otel-collector)
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: fxvol-otel-collector
    profiles: ["obs"]
    restart: unless-stopped
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./obs/otel-collector.yml:/etc/otel-collector.yml:ro
    depends_on:
      tempo:
        condition: service_healthy
    networks:
      - fxvol-internal
    expose:
      - "4317"   # OTLP gRPC receiver (engines send here)

  grafana:
    image: grafana/grafana-oss:11.3.0
    container_name: fxvol-grafana
    profiles: ["obs"]
    restart: unless-stopped
    environment:
      # Dev-only : anonymous admin. EC2 prod doit désactiver
      # GF_AUTH_ANONYMOUS_ENABLED et configurer basic auth ou OAuth
      # (cf. spec § Phase 1 anti-patterns).
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SAMESITE: "lax"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./obs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./obs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks:
      - fxvol-internal
    # Host port 3000 mapping pour ouverture browser directe en dev.
    # En EC2 prod, retirer ce mapping et passer par nginx reverse-proxy.
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  # Exposed to the public internet — only nginx lives here (R6 PR #3).
  fxvol-public:
    driver: bridge
  # Back-of-house services that only talk to each other (api, postgres,
  # redis, frontend bundle server, ib-gateway).
  fxvol-internal:
    driver: bridge
    internal: false
  # Outbound-only lane for IB Gateway — lets it reach IB servers while
  # keeping the rest of the stack isolated from the wider internet.
  fxvol-external:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  # P1 obs — LGTM stack persistent storage.
  prom_data:
  loki_data:
  grafana_data:
  # P2 obs — Tempo traces storage (7 days retention).
  tempo_data:
