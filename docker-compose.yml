# Production-like compose file. Ships the full v2 stack across three
# networks (public / internal / external) so downstream PRs can just
# attach new services (api, frontend, nginx, ib-gateway) without
# reworking the topology.
#
# Dev quick-iter continues to live in docker-compose.dev.yml — that one
# only exposes postgres + redis on host ports so the app code can run
# on the host with uvicorn / vite dev-server. Prefer this file when you
# want a stack that mirrors prod (no host port exposure by default).

services:
  postgres:
    image: postgres:16-alpine
    container_name: fxvol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fxvol
      POSTGRES_USER: fxvol
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    networks:
      - fxvol-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fxvol -d fxvol"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fxvol-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      - fxvol-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    image: ${API_IMAGE:-fx-options-api:local}
    container_name: fxvol-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://fxvol:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/fxvol
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fxvol-internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s

  market-data:
    build:
      context: .
      dockerfile: src/services/market_data/Dockerfile
    image: ${MARKET_DATA_IMAGE:-fx-options-market-data:local}
    container_name: fxvol-market-data
    # Opt-in with the ``engines`` profile so a plain ``docker compose up``
    # (api demo) does not spin up a live IB connection.
    profiles: ["engines"]
    restart: unless-stopped
    environment:
      SERVICE_NAME: market_data
      IB_HOST: ib-gateway
      IB_PORT: 4002
      IB_CLIENT_ID: 1
      MARKET_SYMBOL: ${MARKET_SYMBOL:-EURUSD}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
      ib-gateway:
        condition: service_started
        required: false
    networks:
      - fxvol-internal
    healthcheck:
      test:
        - CMD-SHELL
        # Heartbeat est écrit en ISO-8601 par bus.publisher.set_heartbeat
        # (cf. src/bus/publisher.py). float(ts) sur une string ISO crash —
        # on parse via datetime.fromisoformat. Max age 60s = 60× la cadence
        # de push (~1s).
        - "python -c \"import redis, os, sys; from datetime import datetime, timezone; r = redis.Redis.from_url(os.environ['REDIS_URL']); ts = r.get('heartbeat:market_data'); ts_dt = datetime.fromisoformat(ts.decode().replace('Z', '+00:00')) if ts else None; age = (datetime.now(timezone.utc) - ts_dt).total_seconds() if ts_dt else 999; sys.exit(0 if age < 60 else 1)\""
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  vol-engine:
    build:
      context: .
      dockerfile: src/services/vol/Dockerfile
    image: ${VOL_ENGINE_IMAGE:-fx-options-vol-engine:local}
    container_name: fxvol-vol-engine
    profiles: ["engines"]
    restart: unless-stopped
    environment:
      SERVICE_NAME: vol_engine
      IB_HOST: ib-gateway
      IB_PORT: 4002
      IB_CLIENT_ID: 2
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Signal calibration (ex config/vol_config.json, R9 inline en env).
      THRESHOLD_VOL_PTS: ${THRESHOLD_VOL_PTS:-1.0}
      MODEL_P: ${MODEL_P:-har}
    depends_on:
      redis:
        condition: service_healthy
      market-data:
        condition: service_started
      ib-gateway:
        condition: service_started
        required: false
    networks:
      - fxvol-internal
    healthcheck:
      test:
        - CMD-SHELL
        # Heartbeat ISO-8601 — cf. healthcheck market-data ci-dessus.
        # Max age 300s parce que vol-engine cycle = 30s + 2-5s de calc
        # GARCH/SVI = ~5min toléré sans push.
        - "python -c \"import redis, os, sys; from datetime import datetime, timezone; r = redis.Redis.from_url(os.environ['REDIS_URL']); ts = r.get('heartbeat:vol_engine'); ts_dt = datetime.fromisoformat(ts.decode().replace('Z', '+00:00')) if ts else None; age = (datetime.now(timezone.utc) - ts_dt).total_seconds() if ts_dt else 999; sys.exit(0 if age < 300 else 1)\""
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 240s

  risk-engine:
    build:
      context: .
      dockerfile: src/services/risk/Dockerfile
    image: ${RISK_ENGINE_IMAGE:-fx-options-risk-engine:local}
    container_name: fxvol-risk-engine
    profiles: ["engines"]
    restart: unless-stopped
    environment:
      SERVICE_NAME: risk_engine
      IB_HOST: ib-gateway
      IB_PORT: 4002
      IB_CLIENT_ID: 3
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
      vol-engine:
        condition: service_started
      ib-gateway:
        condition: service_started
        required: false
    networks:
      - fxvol-internal
    healthcheck:
      test:
        - CMD-SHELL
        # Heartbeat ISO-8601 — cf. healthcheck market-data ci-dessus.
        - "python -c \"import redis, os, sys; from datetime import datetime, timezone; r = redis.Redis.from_url(os.environ['REDIS_URL']); ts = r.get('heartbeat:risk_engine'); ts_dt = datetime.fromisoformat(ts.decode().replace('Z', '+00:00')) if ts else None; age = (datetime.now(timezone.utc) - ts_dt).total_seconds() if ts_dt else 999; sys.exit(0 if age < 30 else 1)\""
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  db-writer:
    build:
      context: .
      dockerfile: src/services/db_writer/Dockerfile
    image: ${DB_WRITER_IMAGE:-fx-options-db-writer:local}
    container_name: fxvol-db-writer
    profiles: ["engines"]
    restart: unless-stopped
    environment:
      SERVICE_NAME: db_writer
      DATABASE_URL: postgresql+asyncpg://fxvol:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/fxvol
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fxvol-internal
    healthcheck:
      test:
        - CMD-SHELL
        # Heartbeat ISO-8601 — cf. healthcheck market-data ci-dessus.
        - "python -c \"import redis, os, sys; from datetime import datetime, timezone; r = redis.Redis.from_url(os.environ['REDIS_URL']); ts = r.get('heartbeat:db_writer'); ts_dt = datetime.fromisoformat(ts.decode().replace('Z', '+00:00')) if ts else None; age = (datetime.now(timezone.utc) - ts_dt).total_seconds() if ts_dt else 999; sys.exit(0 if age < 30 else 1)\""
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.web
    image: ${FRONTEND_IMAGE:-fx-options-frontend:local}
    container_name: fxvol-frontend
    restart: unless-stopped
    networks:
      - fxvol-internal
    healthcheck:
      # `wget` ship avec nginx:alpine (busybox). Vérifie que le bundle static
      # est accessible sur le port interne 8080.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  ib-gateway:
    # Upstream unusualalpha publishes on ghcr.io but lags behind IB's
    # mandatory version bumps (seen 2026-04-22 : :stable = 10.19.1j
    # refused as obsolete). gnzsnz/ib-gateway is a drop-in fork that
    # rebuilds monthly. For a pinned local build see
    # `infrastructure/ib-gateway/README.md`.
    image: ${IB_GATEWAY_IMAGE:-ghcr.io/gnzsnz/ib-gateway:latest}
    container_name: fxvol-ib-gateway
    # Opt-in : `docker compose --profile ib up -d` to include IB Gateway.
    # Keeps the default `docker compose up` light and avoids the 4002
    # port-bind when another service (or a Windows reserved range) already
    # owns it. The PyQt v1 app continues to connect to localhost:4002,
    # so it must be started explicitly when needed.
    profiles: ["ib"]
    restart: unless-stopped
    environment:
      TWS_USERID: ${IB_USERID:?IB_USERID is required (load via scripts/load_secrets.ps1)}
      TWS_PASSWORD: ${IB_PASSWORD:?IB_PASSWORD is required (load via scripts/load_secrets.ps1)}
      TRADING_MODE: ${TRADING_MODE:-paper}
      READ_ONLY_API: ${READ_ONLY_API:-no}
      # IBC lifecycle : daily auto-logout at 23:59 Paris is cleaner than a
      # weekly one — IB sessions stale silently otherwise.
      TWS_SETTINGS_PATH: /home/ibgateway/Jts
      AUTO_RESTART_TIME: "11:59 PM"
      # 2FA handling : give IBC 3 min for push validation, then restart
      # instead of crash-looping on timeout.
      TWOFA_TIMEOUT_ACTION: restart
      BYPASS_WARNING: "yes"
      # VNC password loaded from SSM via scripts/load_secrets.ps1 — strict
      # check (every `docker compose up` must have the var set, no fallback).
      VNC_SERVER_PASSWORD: ${VNC_PASSWORD:?VNC_PASSWORD is required (load via scripts/load_secrets.ps1)}
    ports:
      # Bind IB Gateway API port and VNC to 127.0.0.1 only — the PyQt v1
      # app on the host still needs to reach the gateway on localhost:4002,
      # but we do NOT want to expose either port to the LAN.
      - "127.0.0.1:4002:4002"
      - "127.0.0.1:5900:5900"
    networks:
      - fxvol-internal
      - fxvol-external
    volumes:
      # Persist Gateway runtime settings across container recreates.
      # The .ibgzenc encrypted file in $TWS_SETTINGS_PATH/<userid_hash>/
      # is where the GUI Save Settings writes the API config (Trusted
      # IPs, "Allow connections from localhost only", etc.). IBC enforces
      # `TrustedIPs=127.0.0.1` in jts.ini at every boot via its hardcoded
      # SettingsFileEnsurer Java class, but Gateway runtime reads from
      # the .ibgzenc — which we control via this volume.
      #
      # Initial setup (one-shot after first compose up): connect to VNC
      # on 127.0.0.1:5900, Configure → Settings → API → Settings:
      #   - uncheck "Allow connections from localhost only"
      #   - Trusted IPs : 127.0.0.1, 172.19.0.0/24
      #     (CIDR couvre tous les containers de fxvol-internal :
      #     market-data, vol-engine, risk-engine, etc.)
      #   - OK + File → Save Settings
      # Subsequent boots reload these settings from the volume — pas
      # besoin de retoucher la GUI.
      - ib_gateway_jts:/home/ibgateway/Jts
    healthcheck:
      # tcp probe — gnzsnz/ib-gateway is minimal (no nc, netstat, curl,
      # python3, no bash net-redirections). socat is shipped (used by
      # IBC's VNC bridge) and gives a real TCP probe equivalent to the
      # original `nc -z` intent, catching both JVM death AND the
      # dead-socket-but-live-process state.
      test: ["CMD-SHELL", "socat /dev/null TCP:127.0.0.1:4002,connect-timeout=2 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

  nginx:
    image: nginx:alpine
    container_name: fxvol-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx-dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - fxvol-public
      - fxvol-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  # Exposed to the public internet — only nginx lives here (R6 PR #3).
  fxvol-public:
    driver: bridge
  # Back-of-house services that only talk to each other (api, postgres,
  # redis, frontend bundle server, ib-gateway).
  fxvol-internal:
    driver: bridge
    internal: false
  # Outbound-only lane for IB Gateway — lets it reach IB servers while
  # keeping the rest of the stack isolated from the wider internet.
  fxvol-external:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  # IB Gateway settings persistence — see § ib-gateway above.
  ib_gateway_jts:
