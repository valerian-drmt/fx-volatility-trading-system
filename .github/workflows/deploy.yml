name: deploy-prod

# Production deploy workflow. Triggers on a pushed semver tag (v*.*.*)
# or manual workflow_dispatch. SSH to the EC2 host, ship docker-compose
# + the non-secret image manifest, then `sudo systemctl restart
# fxvol-compose` which triggers ExecStartPre=load_secrets.sh to pull
# secrets from SSM via the instance IAM role.
#
# Secrets used by this workflow (non-runtime -- only CI infra) :
#   EC2_HOST, EC2_USER, EC2_SSH_KEY, GITHUB_TOKEN (implicit)
# Runtime secrets (IB_USERID, IB_PASSWORD, DB_PASSWORD, VNC_PASSWORD)
# live in AWS SSM /fxvol/prod/* and are never passed through GitHub.
# The deploy_sha input lets operators redeploy an arbitrary commit
# without tagging -- useful for emergency rollbacks.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      deploy_sha:
        description: "Commit SHA to deploy (defaults to the current ref)"
        required: false
        type: string

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  deploy:
    name: deploy ${{ github.ref_name }} to EC2
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag to deploy
        id: resolve
        run: |
          if [ -n "${{ inputs.deploy_sha }}" ]; then
            echo "image_tag=sha-${{ inputs.deploy_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH for EC2
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Ship compose + image manifest to the host
        # images.env is non-secret : it only holds the GHCR image refs
        # for this deploy. Runtime secrets come from SSM at ExecStartPre
        # time, not from the CI job.
        run: |
          scp -i ~/.ssh/ec2.pem docker-compose.yml \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/fxvol/docker-compose.yml"
          ssh -i ~/.ssh/ec2.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "umask 022 && cat > /opt/fxvol/images.env" <<EOF
          API_IMAGE=${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-api:${{ steps.resolve.outputs.image_tag }}
          FRONTEND_IMAGE=${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-frontend:${{ steps.resolve.outputs.image_tag }}
          MARKET_DATA_IMAGE=${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-market-data:${{ steps.resolve.outputs.image_tag }}
          VOL_ENGINE_IMAGE=${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-vol-engine:${{ steps.resolve.outputs.image_tag }}
          RISK_ENGINE_IMAGE=${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-risk-engine:${{ steps.resolve.outputs.image_tag }}
          DB_WRITER_IMAGE=${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-db-writer:${{ steps.resolve.outputs.image_tag }}
          EOF

      - name: Restart stack via systemd (triggers load_secrets.sh from SSM)
        run: |
          ssh -i ~/.ssh/ec2.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "echo '${{ secrets.GITHUB_TOKEN }}' | sudo docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin && \
             sudo systemctl restart fxvol-compose && \
             sudo docker compose -f /opt/fxvol/docker-compose.yml exec -T api python -m alembic -c persistence/alembic.ini upgrade head"

      - name: "Smoke check /api/v1/health returns 200"
        run: |
          for i in $(seq 1 30); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" https://${{ secrets.EC2_HOST }}/api/v1/health || true)
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 3
          done
          echo "Post-deploy smoke failed — /api/v1/health did not return 200"
          exit 1
