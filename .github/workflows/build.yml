name: build-and-push

# Builds AND pushes the application + engine images to the repo's GitHub
# Container Registry namespace on every push to main (and on manual dispatch),
# tagged `sha-<commit>` + `latest`. The per-commit tag is what the prod deploy
# pulls, so publishing on every main commit makes deploys self-contained:
# `deploy-prod` auto-runs after this workflow succeeds (workflow_run) and ships
# the exact `sha-<commit>` just built. A transient ghcr.io login/push blip only
# reds this post-merge run (re-runnable) — it never blocks a PR.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # needed for ghcr.io push via GITHUB_TOKEN

env:
  REGISTRY: ghcr.io
  # Images live under ghcr.io/<owner>/<name>. github.repository_owner is
  # always lowercase-safe (unlike github.actor which can be MixedCase).
  OWNER: ${{ github.repository_owner }}
  # Publish on every trigger (push-to-main + manual). Deploys need the per-commit
  # image, so we always log in + push.
  PUSH: "true"

jobs:
  build-api:
    name: build + push fx-options-api
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push (api)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/api.Dockerfile
          push: ${{ env.PUSH }}
          # `sha-<short>` for traceability + `latest` for convenience pulls.
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-api:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-frontend:
    name: build + push fx-options-frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # setup-node with npm cache accelerates the multi-stage build — the
      # web.Dockerfile `npm ci` layer is already cached by buildx but the
      # hash hit on the action runner itself avoids re-downloading
      # ~200 MB of tarballs when buildx cold-starts.
      - name: Set up Node 20 with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push (frontend)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/web.Dockerfile
          push: ${{ env.PUSH }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-frontend:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # The four standalone engine containers introduced in R7. A matrix
  # factorises the four identical jobs (only the service name, Dockerfile path
  # and buildx cache scope differ). Each publishes two tags — `sha-<commit>`
  # and `latest` — under the same ghcr.io namespace.
  build-engines:
    name: build + push fx-options-${{ matrix.service.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service:
          - image: market-data
            dockerfile: src/engines/market_data/Dockerfile
          - image: vol-engine
            dockerfile: src/engines/vol/Dockerfile
          - image: risk-engine
            dockerfile: src/engines/risk/Dockerfile
          - image: db-writer
            dockerfile: src/engines/db_writer/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push (${{ matrix.service.image }})
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: ${{ env.PUSH }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-${{ matrix.service.image }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-${{ matrix.service.image }}:latest
          # Distinct buildx scope per service so the four parallel matrix
          # jobs never thrash each other's layer cache.
          cache-from: type=gha,scope=engines-${{ matrix.service.image }}
          cache-to: type=gha,mode=max,scope=engines-${{ matrix.service.image }}
