name: build-and-push

# Build + push the two application images (fx-options-api and
# fx-options-frontend) to the repo's GitHub Container Registry namespace.
# Runs on every push to main (post-merge) and can be triggered manually.
# No deploy side-effect — R8 will layer a deploy job on top of a new tag
# once the EC2 target is provisioned.

on:
  push:
    branches: [main]
    # Continuous deploy is armed (DEPLOY_ENABLED=true) and deploy-prod chains off
    # this build, so a push that changes nothing in the images or the deploy
    # payload must NOT rebuild+redeploy prod. Skip pushes that only touch dev
    # ergonomics / docs / host-side scripts:
    #   - .idea/**       PyCharm run configs (never shipped)
    #   - scripts/**      local + aws host scripts (not in any image nor the
    #                     S3 payload, which is docker-compose.yml + infrastructure + obs)
    #   - docs, *.md, releases/**  documentation only
    # NB: a mixed push (some ignored + some real files) still runs — GitHub only
    # skips when EVERY changed path matches. src/, frontend/, infrastructure/,
    # obs/, docker-compose.yml, pyproject.toml all stay in scope.
    paths-ignore:
      - ".idea/**"
      - "scripts/**"
      - "docs/**"
      - "releases/**"
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # needed for ghcr.io push via GITHUB_TOKEN

env:
  REGISTRY: ghcr.io
  # Images live under ghcr.io/<owner>/<name>. github.repository_owner is
  # always lowercase-safe (unlike github.actor which can be MixedCase).
  OWNER: ${{ github.repository_owner }}

jobs:
  build-api:
    name: build + push fx-options-api
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (api)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/api.Dockerfile
          push: true
          # `sha-<short>` for traceability + `latest` for convenience pulls.
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-api:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-frontend:
    name: build + push fx-options-frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # setup-node with npm cache accelerates the multi-stage build — the
      # web.Dockerfile `npm ci` layer is already cached by buildx but the
      # hash hit on the action runner itself avoids re-downloading
      # ~200 MB of tarballs when buildx cold-starts.
      - name: Set up Node 20 with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (frontend)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/web.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-frontend:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # Build + push the five standalone engine containers. A matrix
  # factorises the otherwise-identical jobs (only the service name,
  # Dockerfile path and buildx cache scope differ). Each one publishes
  # two tags — `sha-<commit>` for reproducible prod pulls and `latest`
  # for convenience — under the same ghcr.io namespace as api +
  # frontend. The execution engine ships from infrastructure/docker/
  # instead of co-located with its source (legacy from R7 split).
  build-engines:
    name: build + push fx-options-${{ matrix.service.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service:
          - image: market-data
            dockerfile: src/engines/market_data/Dockerfile
          - image: vol-engine
            dockerfile: src/engines/vol/Dockerfile
          - image: risk-engine
            dockerfile: src/engines/risk/Dockerfile
          - image: db-writer
            dockerfile: src/engines/db_writer/Dockerfile
          - image: execution
            dockerfile: infrastructure/docker/execution.Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.service.image }})
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-${{ matrix.service.image }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-${{ matrix.service.image }}:latest
          # Distinct buildx scope per service so the four parallel matrix
          # jobs never thrash each other's layer cache.
          cache-from: type=gha,scope=engines-${{ matrix.service.image }}
          cache-to: type=gha,mode=max,scope=engines-${{ matrix.service.image }}
