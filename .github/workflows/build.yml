name: build-and-push

# Builds the application + engine images on every push to main to prove they
# still build (this is the CI signal we care about post-merge). The push to
# the repo's GitHub Container Registry namespace is OPT-IN via the manual
# `workflow_dispatch` trigger only: ghcr.io's token endpoint occasionally
# times out from the runner ("context deadline exceeded"), and the images are
# not consumed by any live deploy yet — so a flaky registry must never red a
# green main. Run the workflow manually when you actually want to publish.
# R8 will layer a deploy job on top of a tag once the EC2 target is provisioned.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # needed for ghcr.io push via GITHUB_TOKEN

env:
  REGISTRY: ghcr.io
  # Images live under ghcr.io/<owner>/<name>. github.repository_owner is
  # always lowercase-safe (unlike github.actor which can be MixedCase).
  OWNER: ${{ github.repository_owner }}
  # Push only on a manual run; a plain push-to-main just builds (no ghcr login).
  PUSH: ${{ github.event_name == 'workflow_dispatch' }}

jobs:
  build-api:
    name: build + push fx-options-api
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on manual run) (api)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.api
          push: ${{ env.PUSH }}
          # `sha-<short>` for traceability + `latest` for convenience pulls.
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-api:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-frontend:
    name: build + push fx-options-frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # setup-node with npm cache accelerates the multi-stage build — the
      # Dockerfile.web `npm ci` layer is already cached by buildx but the
      # hash hit on the action runner itself avoids re-downloading
      # ~200 MB of tarballs when buildx cold-starts.
      - name: Set up Node 20 with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on manual run) (frontend)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.web
          push: ${{ env.PUSH }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-frontend:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # The four standalone engine containers introduced in R7. A matrix
  # factorises the four identical jobs (only the service name, Dockerfile path
  # and buildx cache scope differ). On a manual run each publishes two tags —
  # `sha-<commit>` and `latest` — under the same ghcr.io namespace.
  build-engines:
    name: build + push fx-options-${{ matrix.service.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service:
          - image: market-data
            dockerfile: src/engines/market_data/Dockerfile
          - image: vol-engine
            dockerfile: src/engines/vol/Dockerfile
          - image: risk-engine
            dockerfile: src/engines/risk/Dockerfile
          - image: db-writer
            dockerfile: src/engines/db_writer/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on manual run) (${{ matrix.service.image }})
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: ${{ env.PUSH }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-${{ matrix.service.image }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/fx-options-${{ matrix.service.image }}:latest
          # Distinct buildx scope per service so the four parallel matrix
          # jobs never thrash each other's layer cache.
          cache-from: type=gha,scope=engines-${{ matrix.service.image }}
          cache-to: type=gha,mode=max,scope=engines-${{ matrix.service.image }}
