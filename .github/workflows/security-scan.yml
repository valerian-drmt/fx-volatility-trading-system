name: security-scan

# Weekly Trivy scan of the six production images on GHCR. Fails the run
# (and opens a GitHub Security alert via SARIF upload) on any HIGH or
# CRITICAL finding so CVEs that appeared after the last deploy surface
# without waiting for the next release cycle.
#
# Trigger : Monday 03:00 UTC + manual dispatch. Avoid running on every
# push to keep the GHCR pull quota free for deploys.

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  security-events: write  # SARIF upload to the Security tab

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  trivy:
    name: Trivy scan (${{ matrix.image }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        image:
          - fx-options-api
          - fx-options-frontend
          - fx-options-market-data
          - fx-options-vol-engine
          - fx-options-risk-engine
          - fx-options-db-writer
          - fx-options-execution

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:latest
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"          # fail the job on any HIGH/CRITICAL
          ignore-unfixed: true    # unfixed upstream issues do not fail

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()  # upload even on failure so the reviewer sees the findings
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}
