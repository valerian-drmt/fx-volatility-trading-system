name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: xcb
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxkbcommon-x11-0 libxcb-xinerama0

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest PyQt5 pyqtgraph ib_insync numpy

      - name: Run tests
        run: xvfb-run -a python -m pytest -q
