name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run manual IB paper integration tests"
        required: false
        type: boolean
        default: false

jobs:
  quality-and-unit:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Static Checks
        run: python -m compileall -q src app.py

      - name: Run Ruff
        run: python -m ruff check src tests app.py

      - name: Run Unit Tests
        run: python -m pytest -m "not integration"

  integration:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration == 'true'
    runs-on: ubuntu-latest
    needs: quality-and-unit
    env:
      PYTHONPATH: src
      QT_QPA_PLATFORM: offscreen
      IB_RUN_INTEGRATION: "1"
      IB_HOST: ${{ secrets.IB_HOST }}
      IB_PORT: ${{ secrets.IB_PORT }}
      IB_CLIENT_ID: ${{ secrets.IB_CLIENT_ID }}
      IB_READONLY: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Integration Tests
        run: python -m pytest -m "integration" -rs
