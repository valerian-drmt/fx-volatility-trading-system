name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run manual IB paper integration tests"
        required: false
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: compileall + ruff + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PYTHONPATH: src
      QT_QPA_PLATFORM: offscreen
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.11-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.11-

      - name: Install system libraries for PyQt5 (offscreen)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon-x11-0 \
            libdbus-1-3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xkb1 libxkbcommon0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Static import check (compileall)
        run: python -m compileall -q src app.py

      - name: Lint (ruff)
        run: python -m ruff check src tests app.py

      - name: Run tests (pytest, excluding integration)
        run: python -m pytest -m "not integration" --junitxml=junit.xml

      - name: Upload pytest JUnit artefact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-junit
          path: junit.xml
          retention-days: 14

  db-integration:
    name: alembic migrations + async writer live tests
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 7

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fxvol
          POSTGRES_PASSWORD: fxvol
          POSTGRES_DB: fxvol
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fxvol -d fxvol"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      PYTHONPATH: src
      QT_QPA_PLATFORM: offscreen
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      DATABASE_URL: postgresql+asyncpg://fxvol:fxvol@localhost:5432/fxvol
      DB_RUN_INTEGRATION: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.11-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.11-

      - name: Install system libraries for PyQt5 (offscreen)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon-x11-0 \
            libdbus-1-3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xkb1 libxkbcommon0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run alembic upgrade head
        run: python -m alembic -c persistence/alembic.ini upgrade head

      - name: Run db_integration tests
        run: python -m pytest -m db_integration -v

  integration:
    name: IB paper integration tests (manual only)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration == 'true'
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20

    env:
      PYTHONPATH: src
      QT_QPA_PLATFORM: offscreen
      IB_RUN_INTEGRATION: "1"
      IB_HOST: ${{ secrets.IB_HOST }}
      IB_PORT: ${{ secrets.IB_PORT }}
      IB_CLIENT_ID: ${{ secrets.IB_CLIENT_ID }}
      IB_READONLY: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.11-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests
        run: python -m pytest -m "integration" -rs
