name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run manual IB paper integration tests"
        required: false
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: compileall + ruff + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PYTHONPATH: src
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.11-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.11-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Static import check (compileall)
        run: python -m compileall -q src

      - name: Lint (ruff)
        run: python -m ruff check src tests

      - name: Architecture lint (import-linter contracts)
        run: PYTHONPATH=src lint-imports

      - name: Run tests (pytest, excluding integration)
        run: python -m pytest -m "not integration and not db_integration and not redis_integration" --junitxml=junit.xml

      - name: Upload pytest JUnit artefact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-junit
          path: junit.xml
          retention-days: 14

  frontend:
    name: frontend pipeline (openapi drift + lint + vitest + build artifact)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # R8 PR #3 consolidates the frontend gates into a single job : OpenAPI
    # drift guard against a freshly-dumped FastAPI schema, strict lint,
    # typecheck, Vitest with a 70% line coverage threshold, production
    # build and artefact upload of the resulting dist/ bundle so downstream
    # jobs (deploy in PR #5) can pull it without rebuilding.

    env:
      PYTHONPATH: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Python step is needed before Node because `scripts/dev/dump_openapi.py`
      # spits the live OpenAPI schema that openapi-typescript consumes.
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api]"

      - name: Dump live OpenAPI schema
        run: python scripts/dev/dump_openapi.py openapi.json

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: OpenAPI drift check (schema.d.ts vs live FastAPI)
        working-directory: frontend
        run: |
          npx openapi-typescript ../openapi.json -o /tmp/schema.d.ts
          diff -q src/api/schema.d.ts /tmp/schema.d.ts

      - name: Lint (--max-warnings 0)
        working-directory: frontend
        run: npm run lint

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Unit tests with coverage threshold 70%
        working-directory: frontend
        run: npm run test:coverage

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Upload frontend dist/ artefact
        uses: actions/upload-artifact@v4
        with:
          name: fx-options-frontend-dist
          path: frontend/dist
          retention-days: 14

  nginx-config:
    name: nginx -t syntax + pytest parse
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # frontend.conf and nginx-dev.conf have no TLS cert paths — nginx -t can
      # validate them directly. nginx.conf references /etc/letsencrypt paths
      # that only exist in prod, so we keep it to the pytest parse check.
      - name: nginx -t frontend.conf + nginx-dev.conf
        run: |
          docker run --rm -v "$PWD/infrastructure/nginx":/conf:ro nginx:alpine \
            sh -c 'set -e; for f in /conf/frontend.conf /conf/nginx-dev.conf; do
              printf "events{}\nhttp{\n  include %s;\n}\n" "$f" > /tmp/nginx.conf;
              nginx -t -c /tmp/nginx.conf;
            done'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pytest parse check on every config
        run: |
          python -m pip install --upgrade pip pytest
          python -m pytest tests/old/test_nginx_config_syntax.py -v

  frontend-e2e:
    name: frontend Playwright e2e
    runs-on: ubuntu-latest
    needs: frontend
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build bundle
        run: npm run build

      - name: Run Playwright e2e
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  frontend-e2e-compose:
    name: Playwright e2e against ephemeral docker-compose stack
    # R8 PR #4 : the existing frontend-e2e job runs against vite preview
    # with MSW / route.fulfill mocks. This job brings up the real api,
    # frontend container, Nginx, postgres, redis and an ib-stub, then
    # points Playwright at http://localhost (Nginx entrypoint). Validates
    # the full wiring is reachable through the reverse proxy, not just
    # the bundle in isolation.
    runs-on: ubuntu-latest
    needs: frontend
    timeout-minutes: 20

    env:
      DB_PASSWORD: fxvol
      VNC_PASSWORD: ci-placeholder
      PLAYWRIGHT_BASE_URL: http://localhost

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Boot docker compose stack
        run: docker compose up -d --build

      - name: Apply Alembic migrations
        run: |
          docker compose exec -T api \
            python -m alembic -c src/persistence/alembic.ini upgrade head

      - name: Wait for Nginx to serve the frontend
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://localhost/ > /dev/null && exit 0
            sleep 2
          done
          echo "Nginx did not respond in 60s"
          docker compose ps
          docker compose logs --tail=100
          exit 1

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e against http://localhost
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-compose
          path: frontend/playwright-report
          retention-days: 7

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --tail=300

      - name: Tear down compose
        if: always()
        run: docker compose down --remove-orphans --volumes

  frontend-image:
    name: build frontend docker image
    runs-on: ubuntu-latest
    needs: frontend
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build fx-options-frontend (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/web.Dockerfile
          push: false
          tags: fx-options-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  live-integration:
    name: alembic + writer + redis bus live tests
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 8

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fxvol
          POSTGRES_PASSWORD: fxvol
          POSTGRES_DB: fxvol
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fxvol -d fxvol"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        # Plain redis:7-alpine (no hardened redis.conf mount).
        # The hardened config in infrastructure/redis/redis.conf disables
        # FLUSHDB / CONFIG for prod safety, but tests use per-key DELETE
        # for cleanup so the defaults are fine here and keep the CI setup
        # minimal (no bind-mount gymnastics).
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      PYTHONPATH: src
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      DATABASE_URL: postgresql+asyncpg://fxvol:fxvol@localhost:5432/fxvol
      DB_RUN_INTEGRATION: "1"
      REDIS_URL: redis://localhost:6379/0
      REDIS_RUN_INTEGRATION: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.11-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.11-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,writer]"

      - name: Run alembic upgrade head
        run: python -m alembic -c src/persistence/alembic.ini upgrade head

      - name: Run db_integration tests
        run: python -m pytest -m db_integration -v

      - name: Run redis_integration tests
        run: python -m pytest -m redis_integration -v

  integration:
    name: IB paper integration tests (manual only)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration == 'true'
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20

    env:
      PYTHONPATH: src
      IB_RUN_INTEGRATION: "1"
      IB_HOST: ${{ secrets.IB_HOST }}
      IB_PORT: ${{ secrets.IB_PORT }}
      IB_CLIENT_ID: ${{ secrets.IB_CLIENT_ID }}
      IB_READONLY: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.11-${{ hashFiles('pyproject.toml') }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ib]"

      - name: Run integration tests
        run: python -m pytest -m "integration" -rs
