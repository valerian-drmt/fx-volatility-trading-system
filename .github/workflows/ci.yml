name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run manual IB paper integration tests"
        required: false
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: compileall + ruff + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PYTHONPATH: src
      QT_QPA_PLATFORM: offscreen
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.11-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.11-

      - name: Install system libraries for PyQt5 (offscreen)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon-x11-0 \
            libdbus-1-3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xkb1 libxkbcommon0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Static import check (compileall)
        run: python -m compileall -q src app.py

      - name: Lint (ruff)
        run: python -m ruff check src tests app.py

      - name: Run tests (pytest, excluding integration)
        run: python -m pytest -m "not integration" --junitxml=junit.xml

      - name: Upload pytest JUnit artefact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-junit
          path: junit.xml
          retention-days: 14

  frontend:
    name: frontend lint + typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (vitest)
        run: npm run test

      - name: Build
        run: npm run build

  nginx-config:
    name: nginx -t syntax + pytest parse
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # frontend.conf and nginx-dev.conf have no TLS cert paths — nginx -t can
      # validate them directly. nginx.conf references /etc/letsencrypt paths
      # that only exist in prod, so we keep it to the pytest parse check.
      - name: nginx -t frontend.conf + nginx-dev.conf
        run: |
          docker run --rm -v "$PWD/infrastructure/nginx":/conf:ro nginx:alpine \
            sh -c 'set -e; for f in /conf/frontend.conf /conf/nginx-dev.conf; do
              printf "events{}\nhttp{\n  include %s;\n}\n" "$f" > /tmp/nginx.conf;
              nginx -t -c /tmp/nginx.conf;
            done'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pytest parse check on every config
        run: |
          python -m pip install --upgrade pip pytest
          # --noconftest bypasses the legacy tests/conftest.py which still
          # imports PyQt5 (deprecated, removed in R8). The nginx parse test
          # is purely filesystem-based and needs no fixtures.
          python -m pytest --noconftest tests/test_nginx_config_syntax.py -v

  frontend-e2e:
    name: frontend Playwright e2e
    runs-on: ubuntu-latest
    needs: frontend
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build bundle
        run: npm run build

      - name: Run Playwright e2e
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  frontend-image:
    name: build frontend docker image
    runs-on: ubuntu-latest
    needs: frontend
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build fx-options-frontend (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.web
          push: false
          tags: fx-options-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  openapi-contract:
    name: openapi schema drift (frontend vs FastAPI)
    runs-on: ubuntu-latest
    needs: [quality, frontend]
    timeout-minutes: 6

    env:
      PYTHONPATH: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Dump live OpenAPI schema
        run: python scripts/dump_openapi.py openapi.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Regenerate types from live schema
        working-directory: frontend
        run: npx openapi-typescript ../openapi.json -o /tmp/schema.d.ts

      - name: Fail on drift
        run: diff -q frontend/src/api/schema.d.ts /tmp/schema.d.ts

  live-integration:
    name: alembic + writer + redis bus live tests
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 8

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fxvol
          POSTGRES_PASSWORD: fxvol
          POSTGRES_DB: fxvol
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fxvol -d fxvol"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        # Plain redis:7-alpine (no hardened redis.conf mount).
        # The hardened config in infrastructure/redis/redis.conf disables
        # FLUSHDB / CONFIG for prod safety, but tests use per-key DELETE
        # for cleanup so the defaults are fine here and keep the CI setup
        # minimal (no bind-mount gymnastics).
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      PYTHONPATH: src
      QT_QPA_PLATFORM: offscreen
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      DATABASE_URL: postgresql+asyncpg://fxvol:fxvol@localhost:5432/fxvol
      DB_RUN_INTEGRATION: "1"
      REDIS_URL: redis://localhost:6379/0
      REDIS_RUN_INTEGRATION: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.11-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.11-

      - name: Install system libraries for PyQt5 (offscreen)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon-x11-0 \
            libdbus-1-3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xkb1 libxkbcommon0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run alembic upgrade head
        run: python -m alembic -c persistence/alembic.ini upgrade head

      - name: Run db_integration tests
        run: python -m pytest -m db_integration -v

      - name: Run redis_integration tests
        run: python -m pytest -m redis_integration -v

  integration:
    name: IB paper integration tests (manual only)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration == 'true'
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20

    env:
      PYTHONPATH: src
      QT_QPA_PLATFORM: offscreen
      IB_RUN_INTEGRATION: "1"
      IB_HOST: ${{ secrets.IB_HOST }}
      IB_PORT: ${{ secrets.IB_PORT }}
      IB_CLIENT_ID: ${{ secrets.IB_CLIENT_ID }}
      IB_READONLY: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.11-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests
        run: python -m pytest -m "integration" -rs
