name: "✨ Feature request"
description: "Propose a new feature or enhancement"
title: "[FEAT] <short summary>"
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation / Problem
      description: "Why is this feature useful or necessary?"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: "Describe how it should work (API, UI, logic...)"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context or screenshots
