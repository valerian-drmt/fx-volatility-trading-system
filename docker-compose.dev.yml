services:
  postgres:
    image: postgres:16-alpine
    container_name: fxvol-postgres-dev
    environment:
      POSTGRES_DB: fxvol
      POSTGRES_USER: fxvol
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fxvol}
    ports:
      # Exposed on 5433 to avoid conflict with a native Postgres install that
      # some developers run on 5432. Internally the container still listens on 5432.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fxvol -d fxvol"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
