# Grafana datasources auto-provisioning — P1 obs.
# Spec : docs/LGTM_IMPLEMENTATION_SPEC.md § Phase 1.

apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 2000
