# Grafana datasources auto-provisioning — P1 obs.
# Spec : docs/LGTM_IMPLEMENTATION_SPEC.md § Phase 1.

apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 2000
      derivedFields:
        # Click on trace_id in a Loki log → opens the Tempo trace.
        - datasourceUid: tempo
          matcherRegex: '"trace_id":\s*"([a-f0-9]{32})"'
          name: trace_id
          url: $${__value.raw}

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: -5m
        spanEndTimeShift: 5m
        tags:
          - key: cycle_id
            value: cycle_id
          - key: engine
            value: engine
        filterByTraceID: false
        filterBySpanID: false
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      search:
        hide: false
