# Prometheus config — single-binary scrape of the 5 engine /metrics
# endpoints (+ Prometheus + Loki self-scrape). Metric definitions live
# in src/shared/observability.py ; naming conventions in
# docs/observability/CONVENTIONS.md.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: dev

scrape_configs:
  - job_name: 'engines'
    static_configs:
      - targets:
          - 'market-data:9101'
          - 'vol-engine:9102'
          - 'risk-engine:9103'
          - 'execution-engine:9104'
          - 'db-writer:9105'

  # Per-container CPU/RAM/net/fs (cAdvisor) → the dev Hardware tab graphs these.
  # 5s scrape (overrides the 15s global) so the Hardware time-series can resolve
  # sub-minute events for zoom-in diagnosis; pairs with cAdvisor's 5s
  # housekeeping (docker-compose.yml). Only this job is fine-grained — the
  # engines / self / loki jobs stay at the 15s global.
  - job_name: 'cadvisor'
    scrape_interval: 5s
    static_configs:
      - targets: ['cadvisor:8080']

  # Self-scrape (Prometheus health + tsdb size).
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Loki self-metrics — surfaces ingest rate + storage to the disk
  # usage panel (durcissement panel #7 du dashboard engines-overview).
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
