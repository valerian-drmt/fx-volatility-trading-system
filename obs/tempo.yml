# Tempo single-binary monolithic config — distributed-trace store.
# Filesystem storage, 7-day retention. Fed by otel-collector, queried
# by Grafana via tracesToLogsV2 (cf. obs/grafana/provisioning/
# datasources/datasources.yml).

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  trace_idle_period: 10s
  max_block_bytes: 1_048_576
  max_block_duration: 5m

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

compactor:
  compaction:
    block_retention: 168h  # 7 days
