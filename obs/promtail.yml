# Promtail config — P1 obs.
# Scrapes Docker container stdout via Docker SD. Extracts JSON log
# fields (level, cycle_id, trace_id, event) — `level` becomes a label
# (low-cardinality), `cycle_id` / `trace_id` stay in the message
# content (high-cardinality, queryable via LogQL `|= "cycle_id"`).
# Spec : docs/LGTM_IMPLEMENTATION_SPEC.md § Phase 1.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=fx-volatility-trading-system"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'engine'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
    pipeline_stages:
      # Parse the JSON line emitted by structlog (configure_logging).
      - json:
          expressions:
            level: level
            event: event
            cycle_id: cycle_id
            trace_id: trace_id
            timestamp: timestamp
      # Promote level to a low-cardinality label for fast querying.
      # cycle_id / trace_id stay in the message body (high-cardinality
      # forbidden as labels per CONVENTIONS.md § Labels interdits).
      - labels:
          level:
