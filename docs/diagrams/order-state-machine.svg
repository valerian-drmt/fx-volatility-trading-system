<svg xmlns="http://www.w3.org/2000/svg" width="960" height="400" viewBox="0 0 960 400" font-family="Helvetica,Arial,sans-serif">
  <rect width="960" height="400" fill="#ffffff"/>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#555"/>
    </marker>
  </defs>
  <text x="40" y="30" font-size="13" font-weight="bold">StructureOrder (leg) FSM — fills_handler.py _STATUS_MAP + apply_fill</text>

  <g font-size="11" text-anchor="middle">
    <rect x="40"  y="80" width="150" height="56" rx="8" fill="#f5f5f5" stroke="#666"/>
    <text x="115" y="106" font-weight="bold">pending</text>
    <text x="115" y="122">no IB order</text>

    <rect x="270" y="80" width="170" height="56" rx="8" fill="#dae8fc" stroke="#6c8ebf"/>
    <text x="355" y="106" font-weight="bold">submitted</text>
    <text x="355" y="122">ib_order_id set</text>

    <rect x="520" y="80" width="170" height="56" rx="8" fill="#fff2cc" stroke="#d6b656"/>
    <text x="605" y="106" font-weight="bold">partially_filled</text>
    <text x="605" y="122">qty_filled &lt; target</text>

    <rect x="760" y="80" width="160" height="56" rx="8" fill="#d5e8d4" stroke="#82b366"/>
    <text x="840" y="104" font-weight="bold">filled</text>
    <text x="840" y="120">TERMINAL</text>

    <rect x="270" y="210" width="170" height="46" rx="8" fill="#f8cecc" stroke="#b85450"/>
    <text x="355" y="238" font-weight="bold">cancelled</text>

    <rect x="270" y="290" width="170" height="46" rx="8" fill="#f8cecc" stroke="#b85450"/>
    <text x="355" y="318" font-weight="bold">rejected (Inactive)</text>
  </g>

  <g stroke="#555" stroke-width="1.4" fill="none" marker-end="url(#arr)">
    <line x1="190" y1="108" x2="268" y2="108"/>
    <line x1="440" y1="108" x2="518" y2="108"/>
    <line x1="690" y1="108" x2="758" y2="108"/>
    <path d="M420,136 C450,175 620,175 760,130"/>
    <line x1="355" y1="136" x2="355" y2="208"/>
    <line x1="355" y1="256" x2="355" y2="288"/>
  </g>
  <g font-size="10" fill="#555">
    <text x="228" y="100">place</text>
    <text x="470" y="100">1st fill</text>
    <text x="720" y="100">last fill</text>
    <text x="560" y="168">full fill</text>
    <text x="360" y="180">Cancelled</text>
    <text x="360" y="278">Inactive</text>
  </g>

  <text x="520" y="216" font-size="11" fill="#333">Structure FSM: submitted -&gt; fully_filled (all legs) ; partial_fail</text>
  <text x="520" y="234" font-size="11" fill="#333">(a leg placement threw after k placed).</text>
  <text x="520" y="252" font-size="11" fill="#333">Fills idempotent on ib_execution_id (apply_fill_idempotent).</text>
</svg>
