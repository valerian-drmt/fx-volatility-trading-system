<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="560" viewBox="0 0 1240 560" font-family="Helvetica, Arial, sans-serif" font-size="12">
  <rect width="1240" height="560" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#333"/></marker></defs>

  <!-- ib -->
  <rect x="40" y="300" width="140" height="60" rx="8" fill="#ffe6cc" stroke="#d79b00"/>
  <text x="110" y="326" text-anchor="middle" font-weight="bold">ib-gateway</text>
  <text x="110" y="344" text-anchor="middle">IB API</text>

  <!-- market-data -->
  <rect x="240" y="120" width="170" height="60" rx="8" fill="#d5e8d4" stroke="#82b366"/>
  <text x="325" y="146" text-anchor="middle" font-weight="bold">market-data (id 1)</text>
  <text x="325" y="164" text-anchor="middle">ticks / bars / chains</text>

  <!-- vol-engine -->
  <rect x="240" y="230" width="170" height="60" rx="8" fill="#d5e8d4" stroke="#82b366"/>
  <text x="325" y="256" text-anchor="middle" font-weight="bold">vol-engine (id 2)</text>
  <text x="325" y="274" text-anchor="middle">surface fit + PCA + regime</text>

  <!-- risk-engine -->
  <rect x="240" y="340" width="170" height="60" rx="8" fill="#d5e8d4" stroke="#82b366"/>
  <text x="325" y="366" text-anchor="middle" font-weight="bold">risk-engine (id 3)</text>
  <text x="325" y="384" text-anchor="middle">greeks + delta hedge</text>

  <!-- execution -->
  <rect x="240" y="450" width="170" height="60" rx="8" fill="#d5e8d4" stroke="#82b366"/>
  <text x="325" y="474" text-anchor="middle" font-weight="bold">execution-engine</text>
  <text x="325" y="492" text-anchor="middle">(id 5, :8001) submit/fills</text>

  <!-- redis -->
  <rect x="520" y="230" width="220" height="90" rx="8" fill="#f8cecc" stroke="#b85450"/>
  <text x="630" y="258" text-anchor="middle" font-weight="bold">redis</text>
  <text x="630" y="278" text-anchor="middle">pub/sub channels + SET cache</text>
  <text x="630" y="298" text-anchor="middle">(ticks, vol_update, risk_update, orders:*)</text>

  <!-- db-writer -->
  <rect x="800" y="120" width="190" height="70" rx="8" fill="#d5e8d4" stroke="#82b366"/>
  <text x="895" y="148" text-anchor="middle" font-weight="bold">db-writer</text>
  <text x="895" y="166" text-anchor="middle">Redis to Postgres sink</text>
  <text x="895" y="182" text-anchor="middle">(batch INSERT, idempotent)</text>

  <!-- postgres -->
  <rect x="800" y="260" width="190" height="60" rx="8" fill="#f8cecc" stroke="#b85450"/>
  <text x="895" y="286" text-anchor="middle" font-weight="bold">postgres</text>
  <text x="895" y="304" text-anchor="middle">28-table audit trail</text>

  <!-- api -->
  <rect x="800" y="400" width="220" height="80" rx="8" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="910" y="428" text-anchor="middle" font-weight="bold">api</text>
  <text x="910" y="448" text-anchor="middle">reads Redis cache + Postgres,</text>
  <text x="910" y="466" text-anchor="middle">WS bridge on orders:*/vol/risk/ticks</text>

  <!-- frontend -->
  <rect x="1060" y="410" width="150" height="70" rx="8" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="1135" y="440" text-anchor="middle" font-weight="bold">frontend</text>
  <text x="1135" y="460" text-anchor="middle">REST + /ws/*</text>

  <!-- edges IB -> engines -->
  <line x1="180" y1="315" x2="238" y2="165" stroke="#333" marker-end="url(#a)"/>
  <text x="196" y="238" font-style="italic" fill="#555">ticks/bars</text>
  <line x1="180" y1="320" x2="238" y2="262" stroke="#333" marker-end="url(#a)"/>
  <text x="196" y="286" font-style="italic" fill="#555">chains</text>
  <line x1="180" y1="345" x2="238" y2="368" stroke="#333" marker-end="url(#a)"/>
  <text x="188" y="336" font-style="italic" fill="#555">greeks</text>
  <line x1="238" y1="480" x2="182" y2="352" stroke="#333" marker-start="url(#a)" marker-end="url(#a)"/>
  <text x="188" y="440" font-style="italic" fill="#555">orders/fills</text>

  <!-- engines -> redis -->
  <line x1="410" y1="155" x2="518" y2="245" stroke="#333" marker-end="url(#a)"/>
  <text x="452" y="188" font-style="italic" fill="#555">publish + cache</text>
  <line x1="410" y1="262" x2="518" y2="270" stroke="#333" marker-end="url(#a)"/>
  <line x1="410" y1="368" x2="518" y2="300" stroke="#333" marker-end="url(#a)"/>
  <line x1="410" y1="475" x2="518" y2="315" stroke="#333" marker-end="url(#a)"/>
  <text x="470" y="420" font-style="italic" fill="#555">order events</text>

  <!-- redis -> writer -> pg -->
  <line x1="740" y1="255" x2="798" y2="175" stroke="#333" marker-end="url(#a)"/>
  <text x="748" y="212" font-style="italic" fill="#555">subscribe</text>
  <line x1="895" y1="190" x2="895" y2="258" stroke="#333" marker-end="url(#a)"/>

  <!-- api reads -->
  <line x1="800" y1="420" x2="742" y2="315" stroke="#333" marker-end="url(#a)"/>
  <text x="720" y="390" font-style="italic" fill="#555">read cache</text>
  <line x1="895" y1="400" x2="895" y2="322" stroke="#333" marker-end="url(#a)"/>
  <text x="900" y="365" font-style="italic" fill="#555">read tables</text>

  <!-- api -> exec (dashed) -->
  <line x1="800" y1="450" x2="412" y2="470" stroke="#333" stroke-dasharray="5 3" marker-end="url(#a)"/>
  <text x="600" y="446" text-anchor="middle" font-style="italic" fill="#555">submit (HTTP :8001)</text>

  <!-- frontend -> api -->
  <line x1="1058" y1="445" x2="1022" y2="445" stroke="#333" marker-end="url(#a)"/>
  <text x="1040" y="500" text-anchor="middle" font-style="italic" fill="#555">REST + WS</text>
</svg>
