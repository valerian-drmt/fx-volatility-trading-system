<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="770" viewBox="0 0 1200 770" font-family="Helvetica, Arial, sans-serif" font-size="12">
  <rect width="1200" height="770" fill="#ffffff"/>
  <defs><marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#333"/></marker></defs>

  <!-- frontend -->
  <rect x="60" y="40" width="200" height="60" rx="8" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="160" y="66" text-anchor="middle" font-weight="bold">frontend</text>
  <text x="160" y="84" text-anchor="middle">React 18 SPA (nginx:alpine)</text>

  <!-- nginx -->
  <rect x="60" y="150" width="200" height="60" rx="8" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="160" y="176" text-anchor="middle" font-weight="bold">nginx</text>
  <text x="160" y="194" text-anchor="middle">reverse proxy (80/443)</text>

  <!-- api -->
  <rect x="60" y="270" width="200" height="60" rx="8" fill="#d5e8d4" stroke="#82b366"/>
  <text x="160" y="296" text-anchor="middle" font-weight="bold">api *</text>
  <text x="160" y="314" text-anchor="middle">FastAPI REST + WS (8000)</text>

  <!-- redis -->
  <rect x="480" y="150" width="180" height="60" rx="8" fill="#f8cecc" stroke="#b85450"/>
  <text x="570" y="176" text-anchor="middle" font-weight="bold">redis</text>
  <text x="570" y="194" text-anchor="middle">pub/sub + cache (7)</text>

  <!-- postgres -->
  <rect x="480" y="270" width="180" height="60" rx="8" fill="#f8cecc" stroke="#b85450"/>
  <text x="570" y="296" text-anchor="middle" font-weight="bold">postgres</text>
  <text x="570" y="314" text-anchor="middle">PostgreSQL 16</text>

  <!-- market-data -->
  <rect x="480" y="380" width="180" height="60" rx="8" fill="#d5e8d4" stroke="#82b366"/>
  <text x="570" y="406" text-anchor="middle" font-weight="bold">market-data *</text>
  <text x="570" y="424" text-anchor="middle">clientID 1 (ticks/bars)</text>

  <!-- vol-engine -->
  <rect x="480" y="470" width="180" height="70" rx="8" fill="#d5e8d4" stroke="#82b366"/>
  <text x="570" y="498" text-anchor="middle" font-weight="bold">vol-engine *</text>
  <text x="570" y="515" text-anchor="middle">clientID 2</text>
  <text x="570" y="531" text-anchor="middle">SVI/SSVI/GARCH/HAR/PCA/GMM</text>

  <!-- risk-engine -->
  <rect x="480" y="570" width="180" height="60" rx="8" fill="#d5e8d4" stroke="#82b366"/>
  <text x="570" y="596" text-anchor="middle" font-weight="bold">risk-engine *</text>
  <text x="570" y="614" text-anchor="middle">clientID 3 (greeks + hedge)</text>

  <!-- execution-engine -->
  <rect x="480" y="660" width="180" height="60" rx="8" fill="#d5e8d4" stroke="#82b366"/>
  <text x="570" y="686" text-anchor="middle" font-weight="bold">execution-engine *</text>
  <text x="570" y="704" text-anchor="middle">clientID 5, :8001 (orders)</text>

  <!-- db-writer -->
  <rect x="740" y="210" width="180" height="60" rx="8" fill="#d5e8d4" stroke="#82b366"/>
  <text x="830" y="236" text-anchor="middle" font-weight="bold">db-writer *</text>
  <text x="830" y="254" text-anchor="middle">Redis to Postgres sink</text>

  <!-- ib-gateway -->
  <rect x="900" y="500" width="200" height="60" rx="8" fill="#ffe6cc" stroke="#d79b00"/>
  <text x="1000" y="526" text-anchor="middle" font-weight="bold">ib-gateway</text>
  <text x="1000" y="544" text-anchor="middle">gnzsnz/ib-gateway (IB API)</text>

  <!-- obs -->
  <rect x="900" y="640" width="260" height="90" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-dasharray="5 3"/>
  <text x="1030" y="666" text-anchor="middle" font-weight="bold">obs profile (opt-in, 7 svc)</text>
  <text x="1030" y="686" text-anchor="middle">Prometheus / cAdvisor / Loki / Tempo /</text>
  <text x="1030" y="704" text-anchor="middle">Grafana / promtail / otel-collector</text>

  <!-- note -->
  <text x="60" y="360" font-style="italic" fill="#555">* ships our Python code (src/)</text>

  <!-- edges -->
  <line x1="160" y1="100" x2="160" y2="148" stroke="#333" marker-end="url(#a)"/>
  <text x="196" y="128" font-style="italic" fill="#555">HTTP/WS</text>
  <line x1="160" y1="210" x2="160" y2="268" stroke="#333" marker-end="url(#a)"/>
  <line x1="260" y1="290" x2="478" y2="188" stroke="#333" marker-end="url(#a)"/>
  <line x1="260" y1="305" x2="478" y2="295" stroke="#333" marker-end="url(#a)"/>
  <line x1="260" y1="320" x2="478" y2="685" stroke="#333" marker-end="url(#a)"/>
  <text x="330" y="520" font-style="italic" fill="#555" transform="rotate(56 330 520)">HTTP :8001</text>

  <line x1="570" y1="380" x2="570" y2="212" stroke="#333" marker-end="url(#a)"/>
  <line x1="570" y1="470" x2="570" y2="332" stroke="#333" marker-end="url(#a)"/>
  <line x1="570" y1="570" x2="570" y2="332" stroke="#333" marker-end="url(#a)"/>

  <line x1="660" y1="230" x2="738" y2="235" stroke="#333" marker-end="url(#a)"/>
  <line x1="830" y1="270" x2="662" y2="300" stroke="#333" marker-end="url(#a)"/>
  <text x="720" y="284" font-style="italic" fill="#555">Redis&#8594;Postgres</text>

  <!-- engines to ib -->
  <line x1="660" y1="410" x2="898" y2="512" stroke="#333" marker-end="url(#a)"/>
  <text x="800" y="452" font-style="italic" fill="#555">ib_insync</text>
  <line x1="660" y1="505" x2="898" y2="525" stroke="#333" marker-end="url(#a)"/>
  <line x1="660" y1="690" x2="898" y2="548" stroke="#333" marker-end="url(#a)"/>
</svg>
