; Alembic configuration for the fx-options-desk persistence schema.
;
; The database URL is NOT declared here — env.py reads DATABASE_URL from the
; environment at migration time. Keeps secrets out of the repo and matches
; the 12-factor setup of the rest of the app.

[alembic]
script_location = persistence/migrations
prepend_sys_path = .:src
file_template = %%(rev)s_%%(slug)s
timezone = UTC
truncate_slug_length = 40
output_encoding = utf-8

; sqlalchemy.url is intentionally empty — env.py injects it from DATABASE_URL.
sqlalchemy.url =

; Post-write hooks (formatting, linting) are intentionally not configured to
; keep the pipeline minimal. Run `ruff format` / `ruff check` manually on new
; migrations before committing if needed.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
