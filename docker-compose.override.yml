# Auto-loaded by `docker compose` in local dev.
# Exposes Postgres and Redis on the host so PyCharm / psql / redis-cli / the
# PyQt v1 app can reach them without going through a container.
#
# Production / CI runs `docker compose -f docker-compose.yml up` WITHOUT this
# file, so these ports stay closed behind the internal network (prod-like).
services:
  postgres:
    ports:
      # Host 5433 -> container 5432, to avoid clashing with a native Postgres
      # install that some developers run on 5432.
      - "127.0.0.1:5433:5432"

  redis:
    ports:
      # Host 6380 -> container 6379, same rationale (avoid native Redis clash).
      - "127.0.0.1:6380:6379"
