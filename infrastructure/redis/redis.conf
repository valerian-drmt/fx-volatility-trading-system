# Redis configuration for fxvol dev / prod.
# Mounted read-only into redis:7-alpine via docker-compose.
# Reference : releases/architecture_finale_project/09-redis.md

# Network
bind 0.0.0.0
port 6379
protected-mode no
# protected-mode off is acceptable because Redis is reachable only from the
# internal Docker network (no port published to the host except 6380 in dev).
# In prod, the service is scoped to the engines/FastAPI containers via the
# compose network; never exposed publicly.

# Memory — bounds growth, evicts oldest key on OOM
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence — RDB snapshots are enough for live state recovery.
# AOF disabled : we do not need transaction-level durability, Postgres is
# the source of truth (see R1/R2). Redis is a cache + pub/sub bus.
save 900 1
save 300 10
save 60 10000
appendonly no

# Logging
loglevel notice
logfile ""

# Slowlog — capture queries >10ms for ops visibility
slowlog-log-slower-than 10000
slowlog-max-len 128

# Disable commands that would let an attacker wipe the cache or rewrite
# the config from inside a compromised service. Renaming to the empty
# string makes them unreachable even for authenticated clients.
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""
