# Production outer Nginx — terminates TLS via Let's Encrypt, rate-limits
# anonymous traffic, proxies to the app stack.
#
# Topology (v1): direct Route53 A-record → EIP → this box; the app lives under
# /fx-volatility-trading-system/. A CloudFront distribution in front (S3 CV at
# "/", origin.valeriandarmente.dev as origin hostname) is a documented later
# option — both server_names are accepted below so a cutover needs no conf
# change beyond re-issuing the cert with the origin SAN.

upstream frontend_upstream { server frontend:8080; }
upstream api_upstream      { server api:8000; }

# Basic anti-abuse — 30 req/s per IP, burst 60. WS gets its own low-rate zone:
# handshakes are rare, so a tight cap stops the WS path bypassing api_rl.
limit_req_zone $binary_remote_addr zone=api_rl:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=ws_rl:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

# HTTP → HTTPS redirect (Let's Encrypt ACME challenge stays on :80).
server {
    listen 80;
    server_name valeriandarmente.dev origin.valeriandarmente.dev;
    # Container healthcheck — 200 on :80 without the HTTPS redirect.
    location = /healthz { access_log off; return 200 "ok\n"; }
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name valeriandarmente.dev origin.valeriandarmente.dev;

    # v1 cert: single SAN (valeriandarmente.dev) — init-letsencrypt.sh issues
    # it as-is. Only a CloudFront cutover needs origin.valeriandarmente.dev
    # added as a second SAN (CloudFront uses it as the TLS SNI).
    ssl_certificate     /etc/letsencrypt/live/valeriandarmente.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/valeriandarmente.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    server_tokens off;

    # Security headers. CSP: Plotly needs inline styles + blob workers;
    # everything else is self. NOTE add_header inheritance: any location that
    # declares its own add_header drops ALL of these — none does today; keep it
    # that way or repeat the whole block there.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss:; worker-src 'self' blob:; frame-ancestors 'none'" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # The whole project lives under /fx-volatility-trading-system/ — UI, API and
    # WS. The trailing slash / URI part on proxy_pass strips the project prefix
    # so the upstreams keep serving from their own roots. Longest-prefix match
    # orders these: dev → api → ws → frontend.

    # Dev console (<base>/api/v1/dev/*) is NOT blocked at the edge anymore: it
    # now has two audiences and the app gates them itself
    # (see releases/PLAN_trader_vs_public.md). PUBLIC endpoints (stack, engines,
    # cycle-progress, db-schema, migrations, hardware, containers/metrics) are a
    # safe read-only showcase; TRADER endpoints (tables, logs, redis) keep
    # require_write. So /dev just falls through to the /api/ proxy below.

    location /fx-volatility-trading-system/api/ {
        limit_req zone=api_rl burst=60 nodelay;
        proxy_pass http://api_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /fx-volatility-trading-system/ws/ {
        limit_req zone=ws_rl burst=10 nodelay;
        limit_conn ws_conn 10;
        proxy_pass http://api_upstream/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Trading desk (static bundle). The frontend container serves from its own
    # root and its SPA fallback (try_files … /index.html) owns client routing.
    location = /fx-volatility-trading-system { return 301 /fx-volatility-trading-system/; }
    location /fx-volatility-trading-system/ {
        proxy_pass http://frontend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # The apex "/" is owned by CloudFront → S3 (the CV) and does not reach this
    # origin in normal operation. Kept as a redirect so hitting the box directly
    # (pre-cutover, or via the origin hostname) still lands on the app.
    location = / { return 302 /fx-volatility-trading-system/; }

    # Anything else hitting the origin directly is not part of the app surface.
    location / { return 404; }
}