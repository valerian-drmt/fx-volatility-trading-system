# Production outer Nginx — terminates TLS via Let's Encrypt, rate-limits
# anonymous traffic, proxies to the app stack. Finalised in R8; landed here
# with the dev stack so the prod/dev diff is visible in one release.

upstream frontend_upstream { server frontend:8080; }
upstream api_upstream      { server api:8000; }

# Basic anti-abuse — 30 req/s per IP, burst 60.
limit_req_zone $binary_remote_addr zone=api_rl:10m rate=30r/s;

# HTTP → HTTPS redirect (Let's Encrypt ACME challenge stays on :80).
server {
    listen 80;
    server_name valerian.dev;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name valerian.dev;

    ssl_certificate     /etc/letsencrypt/live/valerian.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/valerian.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers. CSP intentionally permissive for Plotly inline styles.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location /api/ {
        limit_req zone=api_rl burst=60 nodelay;
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
