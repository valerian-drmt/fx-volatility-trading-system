# Production outer Nginx — terminates TLS via Let's Encrypt, rate-limits
# anonymous traffic, proxies to the app stack.
#
# Topology (R11): the apex valeriandarmente.dev is fronted by CloudFront, which
# serves the static CV from S3 at "/" and forwards the project paths to THIS
# origin. CloudFront reaches the box via the dedicated origin hostname
# origin.valeriandarmente.dev (A-record → EIP) and forwards the viewer Host
# header (valeriandarmente.dev), so both names are accepted below. The app is
# served under /fx-volatility-trading-system/ to match the CloudFront behavior.

upstream frontend_upstream { server frontend:8080; }
upstream api_upstream      { server api:8000; }

# Basic anti-abuse — 30 req/s per IP, burst 60.
limit_req_zone $binary_remote_addr zone=api_rl:10m rate=30r/s;

# HTTP → HTTPS redirect (Let's Encrypt ACME challenge stays on :80).
server {
    listen 80;
    server_name valeriandarmente.dev origin.valeriandarmente.dev;
    # Container healthcheck — 200 on :80 without the HTTPS redirect.
    location = /healthz { access_log off; return 200 "ok\n"; }
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name valeriandarmente.dev origin.valeriandarmente.dev;

    # The cert must cover origin.valeriandarmente.dev — CloudFront connects to
    # the origin using that name as the TLS SNI. Re-issue the Let's Encrypt cert
    # with both names as SANs; the live/ path (keyed on the primary name) stays.
    ssl_certificate     /etc/letsencrypt/live/valeriandarmente.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/valeriandarmente.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers. CSP intentionally permissive for Plotly inline styles.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Dev/validation console (/api/v1/dev/*) has no auth by design — it is a
    # local debugging surface. Never expose it in prod: 404 so its existence
    # isn't even advertised. Longest-prefix match wins over /api/ below.
    location /api/v1/dev/ { return 404; }

    location /api/ {
        limit_req zone=api_rl burst=60 nodelay;
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Trading desk under its subpath. The trailing slash on proxy_pass strips
    # the prefix, so the frontend container keeps serving from its own root and
    # its SPA fallback (try_files … /index.html) owns client-side routing.
    location = /fx-volatility-trading-system { return 301 /fx-volatility-trading-system/; }
    location /fx-volatility-trading-system/ {
        proxy_pass http://frontend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # The apex "/" is owned by CloudFront → S3 (the CV) and does not reach this
    # origin in normal operation. Kept as a redirect so hitting the box directly
    # (pre-cutover, or via the origin hostname) still lands on the app.
    location = / { return 302 /fx-volatility-trading-system/; }

    # Anything else hitting the origin directly is not part of the app surface.
    location / { return 404; }
}