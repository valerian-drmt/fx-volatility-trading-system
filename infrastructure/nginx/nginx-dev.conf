# Outer Nginx in the dev docker-compose stack. Routes browser traffic to the
# frontend container (:8080) and the FastAPI container (:8000). HTTP-only,
# no TLS — TLS termination lives in nginx.conf (prod).
#
# Mirrors prod: the whole project is served under /fx-volatility-trading-system/
# (UI + API + WS). The prefix is stripped before proxying so the upstreams keep
# serving from their own roots.
#
# We resolve service hostnames (frontend / api) at request time via Docker's
# embedded DNS (127.0.0.11) instead of the ``upstream { server … }`` form.
# Reason : ``nginx -t`` performs DNS resolution on the upstream block at
# config-test time, which fails in CI where the docker network is absent.
# The variable form delays resolution to runtime, when we are running inside
# the actual compose network and the names exist. With variables in proxy_pass
# nginx does NOT auto-replace the URI, so we strip the prefix via `rewrite`.
server {
    listen 80;
    server_name localhost;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # Container healthcheck — local 200, no upstream dependency.
    location = /healthz { access_log off; return 200 "ok\n"; }

    # NB: unlike prod (nginx.conf), the LOCAL dev stack does NOT 404 /api/v1/dev/* —
    # the System tab (container stack, engine heartbeats, Redis) + the /dev console
    # are dev tools we want available locally. Prod keeps them gated.

    # REST — strip the project prefix, then pass to FastAPI (serves /api/v1).
    location /fx-volatility-trading-system/api/ {
        set $api_upstream "api:8000";
        rewrite ^/fx-volatility-trading-system(/api/.*)$ $1 break;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Root-absolute /api/ too — the sandbox-only /dev console pages fetch
    # "/api/v1/dev/*" without the project prefix (they predate the deploy base).
    # Dev stack only; prod (nginx.conf) serves strictly under the subpath.
    location /api/ {
        set $api_upstream "api:8000";
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # WebSocket — needs Upgrade/Connection headers and a long read timeout
    # (otherwise the connection is killed every 60s by default).
    location /fx-volatility-trading-system/ws/ {
        set $api_upstream "api:8000";
        rewrite ^/fx-volatility-trading-system(/ws/.*)$ $1 break;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Static bundle served by the frontend container (from its own root).
    location = /fx-volatility-trading-system { return 301 /fx-volatility-trading-system/; }
    location /fx-volatility-trading-system/ {
        set $frontend_upstream "frontend:8080";
        rewrite ^/fx-volatility-trading-system/(.*)$ /$1 break;
        proxy_pass http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Nothing lives at the apex in the dev stack — bounce to the app.
    location = / { return 302 /fx-volatility-trading-system/; }
}