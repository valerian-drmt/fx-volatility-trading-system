# Outer Nginx in the dev docker-compose stack. Routes browser traffic to the
# frontend container (:8080) and the FastAPI container (:8000). HTTP-only,
# no TLS — TLS termination lands in R8 (nginx.conf below).
#
# We resolve service hostnames (frontend / api) at request time via Docker's
# embedded DNS (127.0.0.11) instead of the ``upstream { server … }`` form.
# Reason : ``nginx -t`` performs DNS resolution on the upstream block at
# config-test time, which fails in CI where the docker network is absent.
# The variable form delays resolution to runtime, when we are running inside
# the actual compose network and the names exist.
server {
    listen 80;
    server_name localhost;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # REST — pass everything under /api/ straight to FastAPI.
    location /api/ {
        set $api_upstream "api:8000";
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # WebSocket — needs Upgrade/Connection headers and a long read timeout
    # (otherwise the connection is killed every 60s by default).
    location /ws/ {
        set $api_upstream "api:8000";
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Everything else — static bundle served by the frontend container.
    location / {
        set $frontend_upstream "frontend:8080";
        proxy_pass http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
