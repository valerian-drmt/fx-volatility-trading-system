# Outer Nginx in the dev docker-compose stack. Routes browser traffic to the
# frontend container (:8080) and the FastAPI container (:8000). HTTP-only,
# no TLS — TLS termination lands in R8 (nginx.conf below).
upstream frontend_upstream { server frontend:8080; }
upstream api_upstream      { server api:8000; }

server {
    listen 80;
    server_name localhost;

    # REST — pass everything under /api/ straight to FastAPI.
    location /api/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # WebSocket — needs Upgrade/Connection headers and a long read timeout
    # (otherwise the connection is killed every 60s by default).
    location /ws/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Everything else — static bundle served by the frontend container.
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
