# Nginx JSON access log format — T2 logs unification.
# Mounted at /etc/nginx/conf.d/00-log-format.conf so it loads BEFORE
# default.conf (alpha-ordered include), defining `log_format json` at
# http-level for the server blocks to reference via `access_log`.
#
# Format aligned with structlog JSON keys (`timestamp`, `level`, `event`)
# so Loki / Grafana can filter nginx lines the same way as engine logs.
# Loki pipeline in obs/promtail.yml extracts `level` automatically.

log_format json_combined escape=json
  '{'
    '"timestamp":"$time_iso8601",'
    '"level":"info",'
    '"event":"http_request",'
    '"service_name":"nginx",'
    '"remote_addr":"$remote_addr",'
    '"method":"$request_method",'
    '"path":"$request_uri",'
    '"status":$status,'
    '"bytes_sent":$bytes_sent,'
    '"request_time_ms":$request_time,'
    '"upstream":"$upstream_addr",'
    '"upstream_response_time":"$upstream_response_time",'
    '"http_referer":"$http_referer",'
    '"http_user_agent":"$http_user_agent"'
  '}';

# Override the default combined access log → JSON.
access_log /var/log/nginx/access.log json_combined;
# error_log stays in nginx's native format (severity tag is parseable
# via a regex in Promtail pipeline) ; the format is harder to JSONify
# without losing the multiline stack info.
