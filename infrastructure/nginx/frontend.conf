# Served from inside the frontend container (nginx:alpine) — exposes the
# static React bundle on :8080 to the outer Nginx reverse proxy.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed asset bundles: cache forever (immutable content).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — any non-asset URL serves index.html so react-router owns it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sensible defaults.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Gzip text assets (brotli would need nginx-brotli module, skipped for dev parity).
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
